<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>브리핑 — 서울예대 방송영상</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<style>
:root{--bg:#111;--card:#1a1a1a;--border:rgba(255,255,255,.08);--muted:#666;--accent:#facc15;--purple:#a78bfa;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:#eee;font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;font-size:14px;min-height:100vh;}
button{cursor:pointer;font-family:inherit;}

/* ── 헤더 ── */
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:.55rem 1.2rem;background:#0d0d0d;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.top-logo{display:flex;align-items:center;gap:.6rem;}
.on-badge{background:#e53e3e;color:#fff;font-size:.6rem;font-weight:800;padding:.15rem .4rem;border-radius:3px;letter-spacing:.08em;}
.logo-text{font-size:1.05rem;font-weight:800;letter-spacing:-.02em;}
.free-badge{font-size:.6rem;background:rgba(74,222,128,.15);color:#4ade80;border:1px solid rgba(74,222,128,.3);padding:.1rem .35rem;border-radius:3px;}
.clock{font-size:.88rem;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;}

/* ── 키워드 관리 ── */
.kw-bar{display:flex;align-items:center;gap:.5rem;padding:.45rem 1rem;background:#0f0f0f;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.kw-label{font-size:.65rem;color:var(--muted);white-space:nowrap;}
.kw-chips{display:flex;flex-wrap:wrap;gap:.3rem;flex:1;}
.kw-chip{font-size:.68rem;padding:.2rem .55rem;border-radius:100px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:var(--muted);transition:.15s;}
.kw-chip.on{background:rgba(250,204,21,.15);border-color:rgba(250,204,21,.4);color:#fcd34d;}
.kw-chip:hover{opacity:.8;}
.kw-del{font-size:.55rem;margin-left:.2rem;opacity:.5;}
.kw-actions{display:flex;gap:.3rem;flex-shrink:0;}
.kw-act-btn{font-size:.62rem;padding:.2rem .5rem;border-radius:4px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--muted);}
.kw-act-btn:hover{background:rgba(255,255,255,.1);color:#eee;}
.kw-input-wrap{display:flex;gap:.3rem;width:100%;}
.kw-input{flex:1;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:5px;padding:.3rem .6rem;color:#eee;font-size:.72rem;}
.kw-add-btn{font-size:.68rem;padding:.3rem .7rem;border-radius:5px;background:rgba(250,204,21,.15);border:1px solid rgba(250,204,21,.3);color:#fcd34d;}
.fetch-row{display:flex;align-items:center;gap:.6rem;padding:.4rem 1rem;background:#0f0f0f;border-bottom:1px solid var(--border);}
.fetch-btn{padding:.4rem 1rem;border-radius:6px;background:rgba(250,204,21,.2);border:1px solid rgba(250,204,21,.35);color:#fcd34d;font-size:.78rem;font-weight:700;transition:.2s;}
.fetch-btn:hover{background:rgba(250,204,21,.35);}
.fetch-btn:disabled{opacity:.4;cursor:not-allowed;}
.status-txt{font-size:.7rem;color:var(--muted);}
.sel-btns{margin-left:auto;display:flex;gap:.4rem;}
.sel-btn{font-size:.62rem;padding:.2rem .5rem;border-radius:4px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--muted);}

/* ── 탭 ── */
.tabs{display:flex;gap:0;padding:0 1rem;background:#0d0d0d;border-bottom:1px solid var(--border);}
.tab-btn{font-size:.72rem;padding:.55rem .8rem;border:none;background:none;color:var(--muted);border-bottom:2px solid transparent;transition:.15s;}
.tab-btn.active{color:#eee;border-bottom-color:var(--accent);}
.tc{background:#e53e3e;color:#fff;font-size:.55rem;padding:.05rem .3rem;border-radius:100px;margin-left:.25rem;}
.tab-panel{display:none;padding:1rem;}
.tab-panel.active{display:block;}

/* ── 뉴스 그리드 ── */
.news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:.7rem;}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.85rem;transition:.15s;position:relative;}
.card:hover{border-color:rgba(255,255,255,.15);}
.card-num{font-size:.62rem;font-weight:800;color:var(--accent);margin-bottom:.3rem;}
.card-source{font-size:.58rem;color:var(--muted);float:right;}
.card-title{font-size:.82rem;font-weight:600;line-height:1.5;margin-bottom:.4rem;color:#eee;}
.card-title a{color:inherit;text-decoration:none;}
.card-title a:hover{text-decoration:underline;}
.card-desc{font-size:.72rem;color:#999;line-height:1.55;margin-bottom:.5rem;}
.card-summary{font-size:.72rem;color:#bbb;line-height:1.6;margin:.4rem 0;padding:.4rem .6rem;background:rgba(255,255,255,.03);border-left:2px solid rgba(250,204,21,.3);border-radius:0 5px 5px 0;}
.card-kws{display:flex;flex-wrap:wrap;gap:.25rem;margin-top:.35rem;}
.card-kw-tag{font-size:.6rem;font-weight:700;padding:.15rem .45rem;border-radius:100px;background:rgba(123,180,255,.1);color:#93c5fd;border:1px solid rgba(123,180,255,.2);}
.card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:.55rem;padding-top:.45rem;border-top:1px solid var(--border);}
.card-date{font-size:.62rem;color:var(--muted);}
.scrap-btn{font-size:.62rem;padding:.2rem .5rem;border-radius:4px;background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);}
.scrap-btn.on{background:rgba(250,204,21,.1);border-color:rgba(250,204,21,.3);color:#fcd34d;}
.nq-btn{font-size:.72rem;padding:.3rem .7rem;border-radius:5px;border:1px solid rgba(74,222,128,.3);background:rgba(74,222,128,.07);color:#4ade80;cursor:pointer;transition:.2s;}
.nq-btn:hover{background:rgba(74,222,128,.15);}
.sum-btn{font-size:.62rem;padding:.2rem .5rem;border-radius:4px;background:rgba(167,139,250,.08);border:1px solid rgba(167,139,250,.2);color:#a78bfa;}

/* ── AI 요약 팝업 ── */
.sum-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:center;justify-content:center;padding:1rem;}
.sum-box{background:#1a1a1a;border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:1.2rem;width:100%;max-width:520px;max-height:80vh;overflow-y:auto;}
.sum-title{font-size:.85rem;font-weight:700;color:#eee;margin-bottom:.8rem;}
.sum-kw{font-size:.65rem;color:var(--accent);margin-bottom:.4rem;font-weight:700;}
.sum-body{font-size:.78rem;color:#ccc;line-height:1.7;}
.sum-close{float:right;font-size:.72rem;padding:.2rem .5rem;border-radius:4px;background:rgba(255,255,255,.07);border:1px solid var(--border);color:var(--muted);}
.sum-loading{text-align:center;padding:2rem;color:var(--muted);}
.sum-fetch-row{display:flex;align-items:center;justify-content:space-between;margin-top:.8rem;padding-top:.6rem;border-top:1px solid var(--border);}

/* ── 대본 분석 ── */
.sc-controls{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;margin-bottom:1rem;}
.sc-gen-btn{padding:.5rem 1.2rem;border-radius:7px;background:rgba(167,139,250,.2);border:1px solid rgba(167,139,250,.3);color:#c084fc;font-size:.82rem;font-weight:700;}
.sc-gen-btn:disabled{opacity:.4;}
.sc-count{font-size:.65rem;color:var(--muted);}
.sc-collapse-btns{margin-left:auto;display:flex;gap:.3rem;}
.sc-col-btn{font-size:.62rem;padding:.2rem .5rem;border-radius:4px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--muted);}
.sc-loading{display:none;font-size:.75rem;color:var(--muted);padding:.5rem 0;}
.sc-loading.on{display:block;}
.sc-result{display:flex;flex-direction:column;gap:.7rem;}
.sc-empty{text-align:center;padding:2rem;color:var(--muted);font-size:.78rem;}
.sc-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.85rem;}
.sc-card-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none;padding-bottom:.5rem;}
.sc-toggle-btn{font-size:.7rem;color:var(--muted);background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:4px;padding:.15rem .4rem;}
.sc-card.collapsed .sc-card-body{display:none;}
.sc-card.collapsed{padding-bottom:.8rem;}
.sc-card-body{}
.sc-tag{font-size:.6rem;font-weight:700;padding:.15rem .4rem;border-radius:3px;background:rgba(167,139,250,.15);color:#c084fc;margin-right:.25rem;}
.sc-scene{font-size:.75rem;color:var(--muted);margin:.4rem 0;}
.sc-script{font-size:.8rem;line-height:1.8;color:#ddd;background:rgba(255,255,255,.02);border-left:2px solid rgba(167,139,250,.3);padding:.5rem .7rem;border-radius:0 6px 6px 0;margin:.5rem 0;white-space:pre-wrap;}
.sc-q{margin-top:.6rem;padding:.5rem .7rem;background:rgba(250,204,21,.05);border-left:2px solid rgba(250,204,21,.3);border-radius:0 6px 6px 0;}
.sc-q-label{font-size:.6rem;font-weight:700;color:var(--accent);}
.sc-q-text{font-size:.75rem;color:#eee;margin-top:.15rem;}
.sc-foot{display:flex;gap:.4rem;margin-top:.6rem;flex-wrap:wrap;}
.sc-foot-btn{font-size:.65rem;padding:.25rem .6rem;border-radius:5px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:var(--muted);}
.sc-model-btn{background:rgba(167,139,250,.1);border-color:rgba(167,139,250,.2);color:#a78bfa;}
.sc-fb-box{margin-top:.6rem;padding:.6rem .8rem;background:rgba(167,139,250,.05);border:1px solid rgba(167,139,250,.12);border-radius:8px;}
.sc-fb-item{margin-bottom:.5rem;}
.sc-fb-label{font-size:.6rem;font-weight:700;color:#a78bfa;margin-bottom:.15rem;}
.sc-fb-score{font-size:.72rem;color:#eee;}
.sc-fb-text{font-size:.72rem;color:#ccc;line-height:1.55;}
.sc-analysis-form{margin-top:.6rem;display:flex;flex-direction:column;gap:.4rem;}
.sc-form-item{display:flex;flex-direction:column;gap:.2rem;}
.sc-form-label{font-size:.65rem;font-weight:700;color:#a78bfa;}
.sc-form-ta{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:.4rem .6rem;color:#eee;font-size:.75rem;resize:vertical;font-family:inherit;}
.sc-submit-btn{padding:.4rem;border-radius:6px;background:rgba(167,139,250,.2);border:1px solid rgba(167,139,250,.3);color:#c084fc;font-size:.75rem;font-weight:700;}

/* ── 작문 ── */
.wr-controls{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;margin-bottom:.8rem;}
.wr-sel{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:5px;color:#eee;font-size:.75rem;padding:.3rem .5rem;}
.wr-gen-btn{padding:.45rem 1rem;border-radius:6px;background:rgba(74,222,128,.15);border:1px solid rgba(74,222,128,.25);color:#4ade80;font-size:.78rem;font-weight:700;}
.wr-gen-btn:disabled{opacity:.4;}
.wr-loading{display:none;font-size:.72rem;color:var(--muted);padding:.3rem 0;}
.wr-loading.on{display:block;}
.wr-result{display:flex;flex-direction:column;gap:.6rem;}
.wr-topic{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.85rem;}
.wr-tag{font-size:.6rem;font-weight:700;padding:.1rem .35rem;border-radius:3px;background:rgba(74,222,128,.12);color:#4ade80;margin-right:.2rem;}
.wr-kichul{background:rgba(250,204,21,.12);color:#fcd34d;}
.wr-diff{font-size:.58rem;padding:.1rem .3rem;border-radius:3px;margin-left:.2rem;}
.wr-diff.상{background:rgba(239,68,68,.12);color:#f87171;}
.wr-diff.중{background:rgba(251,146,60,.12);color:#fb923c;}
.wr-diff.하{background:rgba(74,222,128,.12);color:#4ade80;}
.wr-q{font-size:.82rem;font-weight:600;color:#eee;margin:.4rem 0 .2rem;}
.wr-hint{font-size:.68rem;color:var(--muted);margin-bottom:.5rem;}
.wr-foot{display:flex;gap:.4rem;flex-wrap:wrap;}
.wr-btn{font-size:.65rem;padding:.25rem .6rem;border-radius:5px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:var(--muted);}
.wr-toggle-btn{background:rgba(74,222,128,.08);border-color:rgba(74,222,128,.2);color:#4ade80;}
.wr-model-box{margin-top:.6rem;font-size:.8rem;color:#ccc;line-height:1.7;display:none;}
.wr-model-box.open{display:block;}
.wm-btn{font-size:.65rem;padding:.25rem .6rem;border-radius:5px;background:rgba(250,204,21,.08);border:1px solid rgba(250,204,21,.2);color:#fcd34d;}
.wr-guide-btn{background:rgba(167,139,250,.08);border-color:rgba(167,139,250,.2);color:#a78bfa;}
.wr-guide-box{margin-top:.5rem;padding:.5rem .7rem;background:rgba(167,139,250,.05);border-left:2px solid rgba(167,139,250,.3);font-size:.72rem;color:#ccc;line-height:1.6;display:none;border-radius:0 6px 6px 0;}
.wr-guide-box.open{display:block;}

/* ── 작문 피드백 ── */
.wf-section{margin-top:1.5rem;padding-top:1rem;border-top:1px solid var(--border);}
.wf-title{font-size:.82rem;font-weight:700;color:#eee;margin-bottom:.6rem;}
.wf-upload-zone{border:2px dashed rgba(255,255,255,.12);border-radius:10px;padding:2rem;text-align:center;cursor:pointer;transition:.2s;margin-bottom:.6rem;}
.wf-upload-zone:hover{border-color:rgba(167,139,250,.4);background:rgba(167,139,250,.04);}
.wf-upload-icon{font-size:2rem;margin-bottom:.4rem;}
.wf-upload-text{font-size:.8rem;color:#eee;}
.wf-upload-sub{font-size:.65rem;color:var(--muted);}
.wf-file-info{font-size:.72rem;color:#4ade80;margin-bottom:.5rem;}
.wf-gen-btn{width:100%;padding:.55rem;border-radius:7px;background:rgba(167,139,250,.2);border:1px solid rgba(167,139,250,.3);color:#c084fc;font-size:.8rem;font-weight:700;}
.wf-gen-btn:disabled{opacity:.4;}
.wf-result{margin-top:.8rem;}
.wf-score{font-size:1.1rem;font-weight:800;color:#eee;margin-bottom:.4rem;}
.wf-summary{font-size:.78rem;color:#bbb;margin-bottom:.8rem;}
.wf-section-title{font-size:.68rem;font-weight:700;color:#a78bfa;margin:.6rem 0 .3rem;}
.wf-item{font-size:.75rem;color:#ccc;line-height:1.6;margin-bottom:.3rem;padding-left:.6rem;}
.wf-orig{color:#f87171;}
.wf-fix{color:#4ade80;}
.wf-export-btn{margin-top:.6rem;font-size:.7rem;padding:.3rem .7rem;border-radius:5px;background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.2);color:#4ade80;}

/* ── 스크랩 ── */
.scrap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:.6rem;}
.scrap-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.7rem;}
.scrap-title{font-size:.8rem;font-weight:600;color:#eee;margin-bottom:.3rem;}
.scrap-title a{color:inherit;text-decoration:none;}
.scrap-title a:hover{text-decoration:underline;}
.scrap-meta{font-size:.62rem;color:var(--muted);margin-bottom:.4rem;}
.scrap-del{font-size:.62rem;padding:.15rem .4rem;border-radius:3px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.15);color:#f87171;}

/* ── 오답노트 ── */
.wrong-list{display:flex;flex-direction:column;gap:.5rem;}
.wrong-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:.7rem;}
.wrong-item-header{display:flex;justify-content:space-between;margin-bottom:.3rem;}
.wrong-kw{font-size:.6rem;font-weight:700;color:#fcd34d;}
.wrong-date{font-size:.6rem;color:var(--muted);}
.wrong-q{font-size:.78rem;color:#eee;margin:.2rem 0 .4rem;line-height:1.5;}
.wrong-hint{font-size:.65rem;color:var(--muted);margin-bottom:.4rem;}
.wrong-answer{font-size:.68rem;color:#bbb;margin-bottom:.4rem;}
.wrong-foot{display:flex;gap:.4rem;}
.wrong-retry{font-size:.62rem;padding:.2rem .5rem;border-radius:4px;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.2);color:#4ade80;}
.wrong-del{font-size:.62rem;padding:.2rem .5rem;border-radius:4px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.15);color:#f87171;}
.wrong-empty{text-align:center;padding:2rem;color:var(--muted);font-size:.78rem;}

/* ── 약점 분석 ── */
.weakness-section{margin-bottom:1.5rem;}
.weakness-title{font-size:.78rem;font-weight:700;color:#eee;margin-bottom:.6rem;}
.weakness-bars{display:flex;flex-direction:column;gap:.4rem;}
.wb-row{display:flex;align-items:center;gap:.5rem;}
.wb-label{font-size:.68rem;color:var(--muted);width:60px;text-align:right;flex-shrink:0;}
.wb-track{flex:1;height:6px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;}
.wb-fill{height:100%;border-radius:3px;transition:.4s;}
.wb-val{font-size:.65rem;color:#eee;width:25px;flex-shrink:0;}

/* ── 타임라인 ── */
.tl-btn{font-size:.65rem;padding:.2rem .5rem;border-radius:4px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--muted);}
.tl-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:400;display:flex;align-items:center;justify-content:center;padding:1rem;}
.tl-box{background:#1a1a1a;border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:1.2rem;width:100%;max-width:640px;max-height:85vh;overflow-y:auto;}
.tl-close{float:right;font-size:.72rem;padding:.2rem .5rem;border-radius:4px;background:rgba(255,255,255,.07);border:1px solid var(--border);color:var(--muted);}
.tl-title{font-size:.85rem;font-weight:700;color:#eee;margin-bottom:.8rem;}
.tl-item{display:flex;gap:.6rem;margin-bottom:.6rem;}
.tl-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:4px;}
.tl-content{flex:1;}
.tl-date{font-size:.6rem;color:var(--muted);}
.tl-text{font-size:.75rem;color:#ddd;line-height:1.5;}
.tl-src{font-size:.58rem;color:var(--muted);}

/* ── 모달 (근거추출) ── */
#nq-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:2000;display:flex;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(6px);}
.nq-modal{background:#181818;border:1px solid rgba(255,255,255,.12);border-radius:14px;width:100%;max-width:700px;max-height:90vh;overflow-y:auto;padding:1.5rem;animation:modalIn .2s ease;}
@keyframes modalIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.nq-modal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.6rem;}
.nq-modal-kw{font-size:.62rem;font-weight:800;color:#fcd34d;}
.nq-modal-close{font-size:.72rem;padding:.25rem .6rem;border-radius:5px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:var(--muted);cursor:pointer;}
.nq-modal-close:hover{background:rgba(255,255,255,.14);color:#fff;}
.nq-modal-title{font-size:.88rem;font-weight:700;color:#eee;line-height:1.55;margin-bottom:.3rem;}
.nq-modal-src{font-size:.62rem;color:var(--muted);margin-bottom:1rem;padding-bottom:.8rem;border-bottom:1px solid rgba(255,255,255,.07);}
.nq-modal-loading{text-align:center;padding:2rem;color:var(--muted);font-size:.8rem;}
.nq-modal .nq-list{display:flex;flex-direction:column;gap:.6rem;margin-bottom:1rem;}
.nq-modal .nq-item{background:rgba(74,222,128,.04);border-left:3px solid rgba(74,222,128,.3);border-radius:0 8px 8px 0;padding:.7rem .9rem;}
.nq-modal .nq-type{font-size:.6rem;font-weight:800;color:#4ade80;letter-spacing:.06em;margin-bottom:.2rem;}
.nq-modal .nq-q{font-size:.8rem;color:#eee;line-height:1.6;margin-bottom:.3rem;}
.nq-modal-answer-section{border-top:1px solid rgba(255,255,255,.08);padding-top:1rem;margin-top:.5rem;}
.nq-modal-selected-q{font-size:.75rem;color:#fcd34d;font-weight:600;margin-bottom:.7rem;line-height:1.5;}
.nq-modal-tabs{display:flex;gap:.4rem;margin-bottom:.7rem;}
.nq-atab{font-size:.7rem;padding:.3rem .7rem;border-radius:6px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--muted);cursor:pointer;}
.nq-atab.active{background:rgba(192,132,252,.15);border-color:rgba(192,132,252,.3);color:#c084fc;}

.nq-answer-ta:focus{outline:none;border-color:rgba(192,132,252,.4);}

</style>

<body>

    <span class="logo-text">브리핑</span>

</div>

<div class="kw-bar">

  <div class="kw-actions">
    <button class="kw-act-btn" onclick="selAll()">전체 선택</button>
    <button class="kw-act-btn" onclick="selNone()">전체 해제</button>
    <button class="kw-act-btn" onclick="resetKw()" style="color:#f87171;border-color:rgba(248,113,113,.3)">↩ 기본 복구</button>

</div>
<div class="kw-bar" style="padding-top:0">
  <div class="kw-input-wrap">
    <input class="kw-input" id="kw-input" placeholder="키워드 추가..." onkeydown="if(event.key==='Enter')addKw()">
    <button class="kw-add-btn" onclick="addKw()">+ 추가</button>
  </div>
</div>

<div class="fetch-row">

  <span class="status-txt" id="status"></span>
  <div class="sel-btns">
    <select class="wr-sel" id="day-sel" onchange="aDays=+this.value">

</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('news',this)">📰 뉴스</button>
  <button class="tab-btn" onclick="switchTab('column',this)">📝 칼럼</button>
  <button class="tab-btn" onclick="switchTab('scrap',this)">⭐ 스크랩 <span class="tc" id="scrap-count">0</span></button>
  <button class="tab-btn" onclick="switchTab('script',this)">🎬 대본분석</button>
  <button class="tab-btn" onclick="switchTab('writing',this)">✍️ 작문</button>
  <button class="tab-btn" onclick="switchTab('wrongnote',this)">❌ 오답노트 <span class="tc" id="wrong-count">0</span></button>
</div>

<div id="panel-news" class="tab-panel active">
  <div id="news-count" style="font-size:.68rem;color:var(--muted);margin-bottom:.6rem;"></div>
  <div class="news-grid" id="news-grid"></div>
</div>

<div id="panel-column" class="tab-panel">

</div>

<div id="panel-scrap" class="tab-panel">

      <button class="sc-col-btn" onclick="collapseAllCards(true)">전체 접기</button>
      <button class="sc-col-btn" onclick="collapseAllCards(false)">전체 펼치기</button>
    </div>

  <div class="sc-loading" id="sc-loading">대본 생성 중...</div>
  <div class="sc-empty" id="sc-empty">대본을 생성하면 여기에 표시됩니다.</div>

</div>

<div id="panel-writing" class="tab-panel">
  <div class="wr-controls">
    <select class="wr-sel" id="wr-kw-sel"><option value="">-- 키워드 선택 --</option></select>
    <button class="wr-gen-btn" onclick="genWriting()">💡 예제 생성</button>
    <span class="wr-loading" id="wr-loading">생성 중...</span>
  </div>
  <div class="wr-result" id="wr-result"></div>
  <div class="wf-section">
    <div class="wf-title">📄 내 작문 AI 첨삭</div>
    <div class="wf-upload-zone" onclick="document.getElementById('wf-file').click()">
      <div class="wf-upload-icon">📄</div>
      <div class="wf-upload-text">TXT 또는 DOCX 파일을 클릭해서 업로드</div>

    <div class="wf-file-info" id="wf-file-info"></div>

    <div class="wf-result" id="wf-result"></div>
  </div>
</div>

<div id="panel-wrongnote" class="tab-panel">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.8rem;">
    <span style="font-size:.78rem;font-weight:700;color:#eee;">❌ 오답노트</span>
    <button onclick="clearWrongNotes()" style="font-size:.62rem;padding:.2rem .5rem;border-radius:4px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.15);color:#f87171;">전체 삭제</button>
  </div>

<!-- AI 요약 팝업 -->
<div id="sum-overlay" style="display:none" onclick="closeSummary()">

    <div class="sum-kw" id="sum-kw"></div>
    <div class="sum-title" id="sum-title"></div>

  <div class="nq-modal" onclick="event.stopPropagation()">

      <div class="nq-modal-kw" id="nq-modal-kw"></div>

        <button class="nq-atab active" onclick="switchAnswerTab('write',this)">✏️ 직접 작성</button>
        <button class="nq-atab" onclick="switchAnswerTab('upload',this)">📁 파일 업로드</button>
      </div>

        <textarea id="nq-answer-ta" class="nq-answer-ta" placeholder="여기에 답안을 작성하세요..."></textarea>
      </div>
      <div id="nq-atab-upload" style="display:none">
        <div class="nq-upload-zone" onclick="document.getElementById('nq-file-input').click()">
          <div class="nq-upload-icon">📄</div>
          <div class="nq-upload-text">TXT 또는 DOCX 파일을 클릭해서 업로드</div>
          <div class="nq-upload-sub">최대 2MB</div>
        </div>
        <input type="file" id="nq-file-input" accept=".txt,.docx" style="display:none" onchange="handleNqFile(this)">

      </div>

      </div>

        <button class="nq-export-btn" onclick="exportNqFeedback()">📄 TXT로 내보내기</button>
      </div>
    </div>

<script>

const DKW=["공영방송·지상파 위기","OTT 플랫폼","AI·기술","숏폼·플랫폼","K콘텐츠","콘텐츠 윤리·규제","예능·포맷"];
const KICHUL=new Set(["공영방송·지상파 위기","OTT 플랫폼","AI·기술","숏폼·플랫폼","K콘텐츠","콘텐츠 윤리·규제","예능·포맷"]);
const COL_SRC=[{url:'http://www.hani.co.kr/rss/opinion/',name:'한겨레'},{url:'https://www.khan.co.kr/rss/rssdata/opinion.xml',name:'경향신문'},{url:'http://rss.donga.com/column.xml',name:'동아일보'},{url:'https://rss.joins.com/joins_opinion_list.xml',name:'중앙일보'},{url:'https://www.chosun.com/arc/outboundfeeds/rss/category/opinion/',name:'조선일보'},{url:'https://www.hankookilbo.com/rss/section/opinion',name:'한국일보'},{url:'https://www.mediatoday.co.kr/rss/allArticle.xml',name:'미디어오늘'},{url:'https://www.pdjournal.com/rss/allArticle.xml',name:'PD저널'},{url:'https://www.mediaus.co.kr/rss/allArticle.xml',name:'미디어스'},{url:'http://www.sisain.co.kr/rss/allArticle.xml',name:'시사IN'},{url:'http://www.ohmynews.com/rss/ohmynews.xml',name:'오마이뉴스'},{url:'https://www.cine21.com/news/rss/',name:'씨네21'},{url:'https://www.artinsight.co.kr/rss/rss.php',name:'아트인사이트'},{url:'https://www.etnews.com/rss/section/section001.xml',name:'전자신문'}];
const NEWS_SRC=[{url:'https://news.kbs.co.kr/rss/rss.do?catecd=0000',name:'KBS'},{url:'http://imnews.imbc.com/rss/news/news_00.xml',name:'MBC'},{url:'https://news.sbs.co.kr/news/rssVodFeed.do?pmd=News&ctgry=culture',name:'SBS'},{url:'https://www.khan.co.kr/rss/rssdata/culture.xml',name:'경향신문'},{url:'http://www.hani.co.kr/rss/culture/',name:'한겨레'},{url:'https://www.yonhapnews.co.kr/RSS/culture.xml',name:'연합뉴스'},{url:'https://www.etnews.com/rss/section/section001.xml',name:'전자신문'},{url:'https://www.mediatoday.co.kr/rss/allArticle.xml',name:'미디어오늘'}];
const BH=[8,12,18],KK='news_keywords_v6';
let kws=[],activeKws=new Set(),aDays=1,scraps={};

function switchTab(t,b){document.querySelectorAll('.tab-btn').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.tab-panel').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById('panel-'+t).classList.add('active');if(t==='scrap')renderScraps();if(t==='wrongnote'){renderWrongNotes();updateWrongCount();}if(t==='script')scLoadList();if(t==='writing')wrLoad();}
function setRange(b){document.querySelectorAll('.date-chip').forEach(x=>x.classList.remove('active'));b.classList.add('active');aDays=parseInt(b.dataset.days);document.getElementById('date-custom').classList.toggle('show',aDays===0);}
function getDF(){if(aDays===0){const f=document.getElementById('date-from').value,to=document.getElementById('date-to').value;return[f?'after:'+f:'',to?'before:'+to:''].filter(Boolean).join('+');}return'when:'+aDays+'d';}
function getRL(){return{1:'1DAY',7:'7일',30:'1달',365:'1년',0:'직접 지정'}[aDays]||aDays+'일';}
function loadKw(){if(!localStorage.getItem('kw_reset_v12')){localStorage.removeItem(KK);localStorage.setItem('kw_reset_v12','1');}try{const s=localStorage.getItem(KK);kws=s?JSON.parse(s):[...DKW];if(!kws.length){kws=[...DKW];localStorage.setItem(KK,JSON.stringify(DKW));}}catch(e){kws=[...DKW];}if(!kws.length)kws=[...DKW];activeKws=new Set(kws);renderKw();updSels();}
function saveKw(){try{localStorage.setItem(KK,JSON.stringify(kws));}catch(e){}}
function renderKw(){document.getElementById('kw-list').innerHTML=kws.map(kw=>{const b=KICHUL.has(kw)?'<span style="font-size:.58rem;background:rgba(255,224,51,.18);color:var(--yellow);border-radius:3px;padding:0 4px;font-weight:700;margin-left:2px;">기출</span>':'';const s=kw.replace(/\\/g,'\\\\').replace(/'/g,"\\'");const on=activeKws.has(kw);return'<button class="kw-chip'+(on?' active':'')+'" onclick="toggleKw(\''+s+'\')">'+kw+b+'<span class="del" onclick="delKw(event,\''+s+'\')">✕</span></button>';}).join('');}
function toggleKw(k){if(activeKws.has(k))activeKws.delete(k);else activeKws.add(k);renderKw();resetWr();}
function selAll(){activeKws=new Set(kws);renderKw();}
function resetWr(){wrTopics=[];wrSeenQ=new Set();wrSave();const r=document.getElementById('wr-result');if(r){r.innerHTML='';r.classList.remove('on');}}
function selNone(){activeKws=new Set();renderKw();}
function resetKw(){
  const saved=JSON.parse(localStorage.getItem('kwList')||'null');
  if(!saved||saved.length===0){
    // 완전히 비어있으면 기본 7개 복구
    localStorage.setItem('kwList',JSON.stringify(DKW));
    activeKws=new Set(DKW);
    loadKw();
    alert('기본 키워드 7개를 복구했어요.');
  } else {
    if(confirm('키워드를 기본 7개로 초기화할까요?')){
      localStorage.setItem('kwList',JSON.stringify(DKW));
      activeKws=new Set(DKW);
      loadKw();
    }
  }
}
function delKw(e,k){e.stopPropagation();kws=kws.filter(x=>x!==k);activeKws.delete(k);saveKw();renderKw();updSels();}
function addKw(){const inp=document.getElementById('kw-input'),v=inp.value.trim();if(!v||kws.includes(v)){inp.value='';return;}kws.push(v);activeKws.add(v);saveKw();renderKw();updSels();inp.value='';}
document.getElementById('kw-input').addEventListener('keydown',e=>{if(e.key==='Enter')addKw();});
function updSels(){['tl-kw-sel','wr-kw-sel'].forEach(id=>{const s=document.getElementById(id);s.innerHTML=kws.map(k=>'<option value="'+k+'">'+k+'</option>').join('');if(kws.length)s.value=s.value&&kws.includes(s.value)?s.value:kws[0];});}

function tick(){const n=new Date(),p=x=>String(x).padStart(2,'0');document.getElementById('clock').textContent=p(n.getHours())+':'+p(n.getMinutes())+':'+p(n.getSeconds());const h=n.getHours(),ids={8:'bt-8',12:'bt-12',18:'bt-18'};let nx=null;BH.forEach(bh=>{const el=document.getElementById(ids[bh]);if(h>bh)el.className='bt done';else if(h===bh)el.className='bt next';else{el.className='bt';if(!nx)nx=p(bh)+':00';}});document.getElementById('next-brief').textContent=nx||'내일 08:00';if(n.getMinutes()===0&&n.getSeconds()===0&&BH.includes(h))fetchAll();}
setInterval(tick,1000);tick();

const isKo=s=>/[가-힣]/.test(s);
const KR_DOMAINS=['kbs.co.kr','imbc.com','sbs.co.kr','jtbc.co.kr','ytn.co.kr',
  'yonhapnews.co.kr','yna.co.kr','hani.co.kr','khan.co.kr','donga.com',
  'chosun.com','joins.com','joongang.co.kr','hankookilbo.com','ohmynews.com',
  'mediatoday.co.kr','pdjournal.com','mediaus.co.kr','sisain.co.kr',
  'cine21.com','etnews.com','zdnet.co.kr','bloter.net','newsis.com',
  'munhwa.com','hankyung.com','mk.co.kr','sedaily.com','segyetimes.com'];
const isKrDomain=url=>{try{const h=new URL(url).hostname.replace(/^www\./,'');return KR_DOMAINS.some(d=>h===d||h.endsWith('.'+d));}catch(e){return false;}};
const isKrNews=item=>isKrDomain(item.link||'')||isKo(item.title||'');

const strip=s=>(s||'').replace(/<[^>]*>/g,'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').trim();
const exSrc=t=>{const m=(t||'').match(/ - ([^-]+)$/);return m?m[1].trim():'뉴스';};
function fmtD(s){if(!s)return'';const d=new Date(s);if(isNaN(d))return s;const df=Math.floor((new Date()-d)/60000);if(df<60)return df+'분 전';if(df<1440)return Math.floor(df/60)+'시간 전';return(d.getMonth()+1)+'/'+(d.getDate());}
function rawTs(s){if(!s)return 0;const d=new Date(s);return isNaN(d)?0:d.getTime();}
async function getRss(url){try{const r=await fetch('/api/rss?url='+encodeURIComponent(url));const d=await r.json();return d.items||[];}catch(e){return[];}}

async function fetchAll(){
  const selected=[...activeKws];
  if(!selected.length){alert('키워드를 하나 이상 선택해주세요');return;}
  const btn=document.getElementById('fetch-btn'),st=document.getElementById('status'),eb=document.getElementById('error-bar');
  btn.disabled=true;eb.style.display='none';st.className='live';
  st.textContent='키워드 '+selected.length+'개 연관어 분석 중...';
  const sk=Array(6).fill(0).map(()=>'<div class="sk"><div class="skel sm"></div><div class="skel lg"></div><div class="skel"></div><div class="skel sm"></div></div>').join('');
  document.getElementById('news-grid').innerHTML=sk;document.getElementById('col-grid').innerHTML=sk;
  try{
    const df=getDF();
    // 1. 모든 선택 키워드 연관어 병렬 확장 (캐시 활용)
    st.textContent='키워드 '+selected.length+'개 연관어 분석 중...';
    const allTermsMap={};
    await Promise.all(selected.map(async kw=>{
      try{
        const ck='expand_'+kw+'_'+new Date().toDateString(),cached=localStorage.getItem(ck);
        if(cached){allTermsMap[kw]=JSON.parse(cached);}
        else{const r=await fetch('/api/summarize',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:'expand',keyword:kw})});const d=await r.json();if(d.terms){allTermsMap[kw]=d.terms.slice(0,6);localStorage.setItem(ck,JSON.stringify(allTermsMap[kw]));}}
      }catch(e){allTermsMap[kw]=[];}
    }));
    // 2. 전체 검색 쿼리 생성
    const allQueries=[];
    selected.forEach(kw=>{
      const terms=allTermsMap[kw]||[];
      const base=[kw,kw+' 방송',kw+' 미디어'].map(q=>df?q+' '+df:q);
      [...base,...terms.slice(0,4).map(t=>df?t+' '+df:t)].forEach(q=>allQueries.push({q,kw}));
    });
    st.textContent='뉴스 수집 중... (키워드 '+selected.length+'개)';
    // 3. 병렬 수집
    const[gR,nsR,cR]=await Promise.all([
      Promise.all(allQueries.map(({q})=>getRss('https://news.google.com/rss/search?q='+encodeURIComponent(q)+'&hl=ko&gl=KR&ceid=KR:ko'))),
      Promise.all(NEWS_SRC.map(s=>fetch('/api/rss?url='+encodeURIComponent(s.url)).then(r=>r.json()).then(d=>({items:d.items||[],name:s.name})).catch(()=>null))),
      Promise.all(COL_SRC.map(s=>fetch('/api/rss?url='+encodeURIComponent(s.url)).then(r=>r.json()).then(d=>({items:d.items||[],name:s.name})).catch(()=>null)))
    ]);
    // 4. 전체 검색어 Set 생성
    const allTermsFlat=new Set(selected.map(k=>k.toLowerCase()));
    Object.values(allTermsMap).flat().forEach(t=>allTermsFlat.add(t.toLowerCase()));
    const sU=new Set(),sT=new Set(),sTK=new Set();
    const normTitle=t=>t.replace(/[\[\]()【】「」''""<>《》\s·…]+/g,'').replace(/[a-zA-Z]/g,'').slice(0,18);
    let nA=[];
    for(const items of gR){for(const item of items){const title=strip(item.title);const tk=normTitle(title);if(sU.has(item.link)||sT.has(title)||sTK.has(tk)||!isKrNews(item)||!preFilterTitle(title))continue;sU.add(item.link);sT.add(title);sTK.add(tk);          nA.push({title,url:item.link,source:item.author||exSrc(item.title),date:fmtD(item.pubDate),rawDate:item.pubDate||'',desc:strip(item.description||'').slice(0,400)});}}
    for(const r of nsR){if(!r?.items?.length)continue;for(const item of r.items){const title=strip(item.title||'');if(!isKo(title))continue;const tl=title.toLowerCase(),desc=strip(item.description||'').toLowerCase();if(![...allTermsFlat].some(w=>w.length>1&&(tl.includes(w)||desc.includes(w))))continue;const a={title,url:item.link,source:r.name,date:fmtD(item.pubDate),rawDate:item.pubDate||'',desc:strip(item.description||'').slice(0,400)};if(sU.has(a.url)||sT.has(a.title))continue;sU.add(a.url);sT.add(a.title);nA.push(a);}}
    if(!nA.length)throw new Error('검색 결과가 없습니다. 기간을 늘려보세요.');
    let cA=[];
    for(const r of cR){if(!r?.items?.length)continue;for(const item of r.items){const title=strip(item.title||'');if(!isKo(title))continue;const tl=title.toLowerCase(),desc=strip(item.description||'').toLowerCase();if(![...allTermsFlat].some(w=>w.length>1&&(tl.includes(w)||desc.includes(w))))continue;const a={title,url:item.link,source:r.name,date:fmtD(item.pubDate),rawDate:item.pubDate||'',desc:strip(item.description||'').slice(0,400)};if(sU.has(a.url)||sT.has(a.title))continue;sU.add(a.url);sT.add(a.title);cA.push(a);}}
    // 5-1. 본문 밀도 선필터 (API 비용 없음)
    const mediaKws=['방송','미디어','OTT','콘텐츠','유튜브','넷플릭스','티빙','웨이브','쿠팡플레이','디즈니','크리에이터','영상','제작','PD','기자','언론','뉴스','드라마','예능','다큐','플랫폼','스트리밍','숏폼','틱톡','인스타','채널','방영','편성','시청','광고','저작권','저널리즘','수신료','공영','지상파','케이블','종편'];
    function densityScore(a){const txt=(a.title+' '+(a.desc||'')).toLowerCase();return mediaKws.filter(k=>txt.includes(k)).length;}
    nA=nA.filter(a=>densityScore(a)>=1);
    cA=cA.filter(a=>densityScore(a)>=1);

    // 5-2. AI 필터 (선필터 후 최대 15개 — 비용 절감)
    st.textContent='✦ AI 관련성 분석 중...';
    let fN=nA,fC=cA;
    try{
      const all=[...nA,...cA].slice(0,15);
      const fr=await fetch('/api/summarize',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:'filter',headlines:all.map(a=>a.title),descriptions:all.map(a=>a.desc||''),keyword:'미디어·방송 관련 이슈'})});
      const fd=await fr.json();
      if(fd.results){const sm={},rs=new Set();fd.results.forEach(r=>{if(r.summary)sm[r.idx]=r.summary;if(r.relevant)rs.add(r.idx);});fN=nA.map((a,i)=>({...a,aiSummary:sm[i]||''})).filter((_,i)=>rs.has(i));fC=cA.map((a,i)=>({...a,aiSummary:sm[nA.length+i]||''})).filter((_,i)=>rs.has(nA.length+i));}
    }catch(e){console.warn('AI 필터 실패');}
    // 6. 전체 최신순 정렬
    fN.sort((a,b)=>rawTs(b.rawDate)-rawTs(a.rawDate));
    fC.sort((a,b)=>rawTs(b.rawDate)-rawTs(a.rawDate));
    const activeKw = (window._activeKwList||[])[0] || '';
    renderGrid('news-grid',fN,'news',activeKw);
    renderGrid('col-grid',fC,'col',activeKw);
    document.getElementById('news-count').textContent=fN.length;
    document.getElementById('col-count').textContent=fC.length;
    st.className='live';
    st.textContent='뉴스 '+fN.length+'건 · 칼럼 '+fC.length+'건 · 키워드 '+selected.length+'개 · '+getRL()+' · '+new Date().toLocaleTimeString('ko-KR');
    document.getElementById('sum-btn').disabled=false;
    window._hl=[...fN,...fC].map(a=>a.title);
    window._activeKwList=selected;
    closeSummary();
    // 예제가 없을 때만 자동 생성 (기존 예제 유지)
    if(wrTopics.length===0) genWriting();
  }catch(err){
    const eh='<div class="empty"><div class="empty-icon">⚠️</div><p><strong>불러오기 실패</strong>'+err.message+'</p></div>';
    document.getElementById('news-grid').innerHTML=eh;document.getElementById('col-grid').innerHTML=eh;
    eb.textContent='오류: '+err.message;eb.style.display='block';st.className='';st.textContent='다시 시도해 주세요';
  }
  btn.disabled=false;
}


const TRASH_KEYWORDS = ['열애','교제','결혼','이혼','임신','출산','팬미팅','생일파티','화보','데이트','골','득점','승리','패배','우승','준우승','경기 결과','이적','계약','선수','감독','축구','야구','농구','배구','골프','수영','육상','주가','코스피','코스닥','코인','비트코인','부동산','청약','금리','환율','펀드','ETF','출시','론칭','오픈','개점','신제품','할인','이벤트','프로모션','지역','구청','군청','시청','축제','행사','봉사','기부금','장학금'];
const KEEP_KEYWORDS = ['OTT','넷플릭스','티빙','웨이브','왓챠','쿠팡플레이','디즈니','애플TV','방송','미디어','콘텐츠 산업','플랫폼','저널리즘','언론','크리에이터','수신료','공영방송','KBS','MBC','SBS','지상파','숏폼','알고리즘','저작권','규제','심의','AI 콘텐츠','딥페이크','버추얼','K콘텐츠','한류'];
function preFilterTitle(title) {
  const t = title.toLowerCase();
  if (KEEP_KEYWORDS.some(k => t.includes(k.toLowerCase()))) return true;
  if (TRASH_KEYWORDS.some(k => t.includes(k.toLowerCase()))) return false;
  return true;
}

    'K콘텐츠':['K드라마','한류','웹툰','K콘텐츠','글로벌','시즌','드라마','영화'],
    '콘텐츠 윤리·규제':['윤리','저작권','규제','심의','가짜뉴스','미디어','저널리즘','신뢰','언론'],
    '예능·포맷':['예능','관찰','포맷','버라이어티','리얼리티','오디션','방송']
  };
  arr = arr.map(a => {
    if (kwList.length && !a.relKws) {
      const txt = (a.title + ' ' + (a.desc||'')).toLowerCase();

  document.getElementById(id).innerHTML=arr.map((a,i)=>{
    const iS=!!scraps[a.url],su=a.url.replace(/'/g,"\\'"),st=a.title.replace(/'/g,"\\'").replace(/"/g,'&quot;');
    return '<div class="news-card" style="animation-delay:'+i*.04+'s">'

      +'<div class="card-title"><a href="'+a.url+'" target="_blank" rel="noopener">'+a.title+'</a></div>'
      +(a.aiSummary?'<div class="card-ai"><span class="ai-badge">AI</span>'+a.aiSummary+'</div>':'')
      +(a.relKws&&a.relKws.length?'<div class="card-kws">'+a.relKws.map(k=>'<span class="card-kw-tag">'+k+'</span>').join('')+'</div>':'')
      +'<div class="card-foot"><span class="card-date">'+a.date+'</span>'

      +'<button class="nq-btn" onclick="genNewsQuestion(this)" data-title="'+encodeURIComponent(a.title)+'" data-summary="'+encodeURIComponent(a.aiSummary||'')+'" data-kw="'+encodeURIComponent(kw||'')+'">💡 예상문제</button>'
      +'</div>'

async function runSummary(){
  const hl=window._hl;if(!hl?.length)return;
  const btn=document.getElementById('sum-btn'),wrap=document.getElementById('summary-wrap'),body=document.getElementById('summary-body');
  btn.disabled=true;document.getElementById('sum-kw').textContent=(window._activeKwList||[]).slice(0,3).join(', ')+(window._activeKwList&&window._activeKwList.length>3?' 외'+(window._activeKwList.length-3)+'개':'');
  body.innerHTML='<span style="color:var(--muted)">AI가 분석 중...</span>';
  wrap.classList.add('on');wrap.scrollIntoView({behavior:'smooth',block:'nearest'});
  try{const r=await fetch('/api/summarize',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({headlines:hl.slice(0,15),keyword:document.getElementById('tl-kw-sel')?.value||''})});const d=await r.json();if(!r.ok)throw new Error(d.error||'요약 실패');body.textContent=d.summary;}
  catch(e){body.textContent='⚠️ 요약 실패: '+e.message;}

}

// ── 예상문제 생성 ──
async function genNewsQuestion(btn) {
  const title = decodeURIComponent(btn.dataset.title||'');
  const summary = decodeURIComponent(btn.dataset.summary||'');
  const kw = decodeURIComponent(btn.dataset.kw||'');
  const cardIdx = btn.closest('.news-card') ? [...document.querySelectorAll('.news-card')].indexOf(btn.closest('.news-card')) : 0;
  const wrap = document.getElementById('nq-' + cardIdx);
  const maWrap = document.getElementById('ma-' + cardIdx);
  if (!wrap) return;
  btn.disabled = true;
  wrap.innerHTML = '<div class="nq-loading">💡 예상문제 생성 중...</div>';
  try {
    const res = await fetch('/api/summarize', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({mode:'newsQuestion', title, summary, keyword:kw})
    });
    const d = await res.json();
    if (!d.questions?.length) throw new Error('질문 없음');
    wrap.innerHTML = '<div class="nq-list">' + d.questions.map((q,qi) => `
      <div class="nq-item">
        <div class="nq-type">${q.type||''} <span class="nq-diff ${q.difficulty||'중'}">${q.difficulty||'중'}</span></div>
        <div class="nq-q">${q.question||''}</div>
        <div class="nq-hint">💡 ${(q.hint||[]).join(' · ')}</div>
        <div style="margin-top:.4rem">
          <button class="ma-btn ma-save" style="font-size:.62rem" onclick="toggleAnswerBox(${cardIdx},${qi})">✏️ 내 답안 작성</button>
        </div>
      </div>`).join('') + '</div>';
    // 내 답안 영역에 문제 저장
    if (maWrap) {
      maWrap.dataset.questions = JSON.stringify(d.questions);
      maWrap.dataset.title = title;
      maWrap.dataset.kw = kw;
    }
  } catch(e) {
    wrap.innerHTML = '<div class="nq-loading">⚠️ 생성 실패: ' + e.message + '</div>';
  }
  btn.disabled = false;
}

function toggleAnswerBox(cardIdx, qIdx) {
  const maWrap = document.getElementById('ma-' + cardIdx);
  if (!maWrap) return;
  maWrap.style.display = maWrap.style.display === 'none' ? 'block' : 'none';
  maWrap.dataset.qidx = qIdx;
  const qs = JSON.parse(maWrap.dataset.questions||'[]');
  const q = qs[qIdx];
  if (q) {
    maWrap.querySelector('.my-answer-ta').placeholder = '[' + (q.type||'') + '] ' + (q.question||'');
  }
}

// ── 내 답안 저장 ──
function saveMyAnswer(btn, cardIdx) {
  const maWrap = document.getElementById('ma-' + cardIdx);
  const ta = maWrap.querySelector('.my-answer-ta');
  const ans = ta.value.trim();
  if (!ans) return;
  const qs = JSON.parse(maWrap.dataset.questions||'[]');
  const qIdx = parseInt(maWrap.dataset.qidx||'0');
  const q = qs[qIdx] || {};
  const saved = JSON.parse(localStorage.getItem('myAnswers')||'[]');
  saved.unshift({
    id: Date.now(),
    date: new Date().toLocaleDateString('ko-KR'),
    kw: maWrap.dataset.kw||'',
    title: maWrap.dataset.title||'',
    question: q.question||'',
    type: q.type||'',
    answer: ans
  });
  localStorage.setItem('myAnswers', JSON.stringify(saved.slice(0,100)));
  btn.textContent = '✅ 저장됨';
  setTimeout(()=>{ btn.textContent='💾 저장'; }, 1500);
}

// ── 오답노트 추가 ──
function addWrongNote(btn, cardIdx) {

  const ans = ta.value.trim();

  btn.textContent = '✅ 추가됨';

// ── AI 피드백 요청 ──
async function requestAnswerFeedback(btn, cardIdx) {
  const maWrap = document.getElementById('ma-' + cardIdx);
  const ta = maWrap.querySelector('.my-answer-ta');
  const ans = ta.value.trim();
  if (!ans) { alert('먼저 답안을 작성해주세요.'); return; }
  btn.disabled = true; btn.textContent = '🤖 분석 중...';
  try {
    const res = await fetch('/api/summarize', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({mode:'writingFeedback', essay: ans})
    });
    const d = await res.json();
    // 피드백 결과를 답안 아래에 표시
    let fbHtml = `<div style="margin-top:.6rem;padding:.6rem .8rem;background:rgba(192,132,252,.06);border-radius:7px;border:1px solid rgba(192,132,252,.15)">`;
    fbHtml += `<div style="font-size:.7rem;font-weight:700;color:#c084fc;margin-bottom:.4rem">🤖 AI 피드백</div>`;
    if (d.score) fbHtml += `<div style="font-size:.78rem;color:#eee;margin-bottom:.3rem">총점: <strong>${d.score}</strong>점 · ${d.summary||''}</div>`;
    if (d.suggestions?.length) fbHtml += `<div style="font-size:.72rem;color:#aaa">${d.suggestions.map(s=>'• '+s).join('<br>')}</div>`;
    fbHtml += '</div>';
    maWrap.insertAdjacentHTML('beforeend', fbHtml);
  } catch(e) {
    alert('피드백 실패: ' + e.message);
  }
  btn.disabled = false; btn.textContent = '🤖 AI 피드백';
}

async function fetchTimeline(){
  const kw=document.getElementById('tl-kw-sel').value,days=parseInt(document.getElementById('tl-range-sel').value);
  const btn=document.getElementById('tl-btn'),con=document.getElementById('tl-container');
  if(!kw)return;btn.disabled=true;
  con.innerHTML='<div class="empty"><div class="empty-icon">📅</div><p>타임라인 수집 중...</p></div>';
  try{
    const qs=[kw,kw+' 방송',kw+' 미디어'].map(q=>q+' when:'+days+'d');
    const results=await Promise.all(qs.map(q=>getRss('https://news.google.com/rss/search?q='+encodeURIComponent(q)+'&hl=ko&gl=KR&ceid=KR:ko')));
    const seen=new Set();let items=[];
    for(const list of results){for(const item of list){const title=strip(item.title);if(seen.has(item.link)||!isKrNews(item))continue;seen.add(item.link);const d=new Date(item.pubDate);if(!isNaN(d))items.push({title,url:item.link,source:item.author||exSrc(item.title),pubDate:d});}}
    if(!items.length){con.innerHTML='<div class="empty"><div class="empty-icon">📅</div><p><strong>결과 없음</strong>기간을 늘리거나 다른 키워드를 시도해보세요</p></div>';btn.disabled=false;return;}
    /* 최신순 정렬 후 날짜별 그룹 */
    items.sort((a,b)=>b.pubDate-a.pubDate);
    const groups={};
    items.forEach(item=>{
      const key=item.pubDate.getFullYear()+'.'+(String(item.pubDate.getMonth()+1).padStart(2,'0'))+'.'+String(item.pubDate.getDate()).padStart(2,'0');
      if(!groups[key])groups[key]=[];groups[key].push(item);
    });
    con.innerHTML='<div class="tl-wrap">'+Object.entries(groups).map(([date,list])=>
      '<div class="tl-group"><div class="tl-date">'+date+'</div><div class="tl-items">'
      +list.map(a=>'<div class="tl-item"><div class="tl-item-title"><a href="'+a.url+'" target="_blank" rel="noopener">'+a.title+'</a></div><div class="tl-item-meta">'+a.source+' · '+a.pubDate.getHours()+':'+String(a.pubDate.getMinutes()).padStart(2,'0')+'</div></div>').join('')
      +'</div></div>').join('')+'</div>';
  }catch(e){con.innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><p><strong>오류</strong>'+e.message+'</p></div>';}
  btn.disabled=false;
}

async function genWriting(){
  // 셀렉터 직접 선택 시 우선, 아니면 activeKws에서 랜덤
  const selVal=document.getElementById('wr-kw-sel').value;
  const kwPool=[...activeKws];
  const usedKws=wrTopics.map(t=>t._kw||'');
  // 아직 안 쓴 키워드 우선, 없으면 전체에서 랜덤
  const unusedPool=kwPool.filter(k=>!usedKws.includes(k));
  const pickPool=unusedPool.length?unusedPool:kwPool;
  const kw=selVal&&selVal!==kwPool[0]?selVal:pickPool[Math.floor(Math.random()*pickPool.length)]||'';
  const btn=document.getElementById('wr-btn'),loading=document.getElementById('wr-loading'),result=document.getElementById('wr-result'),empty=document.getElementById('wr-empty');
  if(!kw)return;
  btn.disabled=true;loading.classList.add('on');empty.style.display='none';
  try{
    // 이미 생성된 유형+문제+태그 AI에게 전달 — 중복 방지
    const usedTitles=wrTopics.map(t=>t.title);
    const usedQuestions=wrTopics.map(t=>t.question.slice(0,30));
    const usedTags=wrTopics.map(t=>(t.tags||[]).join(','));
    const usedTypes=wrTopics.map(t=>t.type||'');
    const r=await fetch('/api/summarize',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mode:'writing',keyword:kw,usedTitles,usedQuestions,usedTags,usedTypes})});
    const d=await r.json();if(!r.ok)throw new Error(d.error||'생성 실패');
    const topics=d.topics||[];
    // 중복 필터링 — 유형+앞30자+태그 기준
    topics.forEach(t=>{
      const qKey=t.title+t.question.slice(0,30)+(t.tags||[]).join('');
      if(!wrSeenQ.has(qKey)){wrSeenQ.add(qKey);t._kw=kw;wrTopics.push(t);}
    });
    wrSave();
    const allTopics=wrTopics;
    result.innerHTML=allTopics.map((t,i)=>{
      const idx=i;
      const sk=t.searchKeyword||kw;
      const newsUrl='https://news.google.com/rss/search?q='+encodeURIComponent(sk+' 방송 미디어')+'&hl=ko&gl=KR&ceid=KR:ko';
      return '<div class="wr-card" style="animation-delay:'+i*.1+'s" id="wc'+i+'">'
        +'<div class="wr-num">작문 예제 '+String(i+1).padStart(2,'0')+' · '+t.title+'</div>'
        +(t.plan ? renderPlanBox(t.plan) : '<div class="wr-question">'+t.question+'</div>')
        +'<div class="wr-hint-label">'+(t.plan?'기획 포인트':'작성 포인트')+'</div>'
        +'<div class="wr-hint">'+(t.hint||[]).map(h=>'<div class="wr-hint-item">'+h+'</div>').join('')+'</div>'
        +'<div class="wr-foot">'
        +'<div class="wr-tags">'+(t.tags||[]).map(tag=>'<span class="wr-tag">'+tag+'</span>').join('')+'</div>'
        +'<button class="wr-news-btn" data-sk="'+sk+'" data-idx="'+idx+'" onclick="loadWrNews(this)">📰 관련 기사 보기</button>'
        +'</div>'
        +'<button class="wr-model-btn" id="wm-btn-'+i+'" onclick="genWritingModel('+i+')">📝 모범 작문 보기</button>'
        +'<div class="wr-model-box" id="wm-box-'+i+'"></div>'
        +'<div class="wr-news-list" id="wn'+i+'"><div style="color:var(--muted);font-size:.75rem;padding:.5rem 0">불러오는 중...</div></div>'
        +'</div>';
    }).join('');
    result.classList.add('on');
  }catch(e){
    result.innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><p><strong>생성 실패</strong>'+e.message+'</p></div>';
    result.classList.add('on');
  }
  loading.classList.remove('on');btn.disabled=false;
}

      method:'POST', headers:{'Content-Type':'application/json'},

    });

    const sideColor = {'찬성에 유리':'#4ade80','반대에 유리':'#f87171','양쪽 모두':'#a78bfa'};
    body.innerHTML = '<div style="font-size:.72rem;color:var(--muted);margin-bottom:.8rem;">📋 작문 본론에 바로 쓸 수 있는 근거예요. 복사해서 활용하세요.</div>'
      + '<div class="nq-list">' + d.arguments.map((arg) => `

            <span class="nq-type">${arg.point||''}</span>

  } catch(e) {
    body.innerHTML = `<div class="nq-modal-loading">⚠️ 생성 실패: ${e.message}</div>`;
  }
}

function copyArgument(btn) {
  const text = btn.dataset.text;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✅ 복사됨';
    setTimeout(() => { btn.textContent = '📋 복사'; }, 1500);
  }).catch(() => { btn.textContent = '❌ 실패'; });
}

async function handleNqFile(input) {
  const file = input.files[0];
  if (!file) return;
  const preview = document.getElementById('nq-file-preview');
  preview.style.display = 'block';
  preview.textContent = '📄 읽는 중...';
  try {
    let text = '';
    if (file.name.endsWith('.txt')) {
      text = await file.text();
    } else if (file.name.endsWith('.docx')) {
      const ab = await file.arrayBuffer();
      const result = await mammoth.extractRawText({arrayBuffer: ab});
      text = result.value;
    }
    text = text.trim().slice(0, 3000);
    _nqCurrent.uploadedText = text;
    preview.textContent = `✅ ${file.name} (${text.length}자 추출됨)`;
    document.getElementById('nq-answer-ta').value = text;
  } catch(e) {
    preview.textContent = '⚠️ 파일 읽기 실패: ' + e.message;
  }
}

async function submitNqFeedback() {
  const ta = document.getElementById('nq-answer-ta');
  const answer = ta.value.trim();
  if (!answer) { alert('답안을 작성하거나 파일을 업로드해주세요.'); return; }
  if (!_nqCurrent.question) { alert('문제를 먼저 선택해주세요.'); return; }
  const btn = document.querySelector('.nq-submit-btn');
  btn.disabled = true; btn.textContent = '🤖 분석 중...';
  const fbWrap = document.getElementById('nq-feedback-wrap');
  fbWrap.style.display = 'block';
  fbWrap.innerHTML = '<div class="nq-modal-loading">AI가 답안을 분석하고 있어요...</div>';
  try {
    const res = await fetch('/api/summarize', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        mode: 'writingFeedback',
        essay: answer,
        context: `[문제] ${_nqCurrent.question}\n[기사 제목] ${_nqCurrent.title}\n[키워드] ${_nqCurrent.kw}`
      })
    });
    const d = await res.json();
    if (d.error) throw new Error(d.error);
    _nqCurrent.feedbackData = d;
    _nqCurrent.answer = answer;
    renderNqFeedback(d);
    document.getElementById('nq-export-row').style.display = 'block';
  } catch(e) {
    fbWrap.innerHTML = `<div class="nq-modal-loading">⚠️ 피드백 실패: ${e.message}</div>`;

const SC_KEY = 'sc_v4';
const tdStr = () => new Date().toISOString().slice(0, 10);

/* ── 저장소 헬퍼 ── */
function scLoad() {
  try { const s = localStorage.getItem(SC_KEY); return s ? JSON.parse(s) : { date: '', gen: 0, fb: 0, scripts: [], analyzed: {}, history: [] }; }
  catch (e) { return { date: '', gen: 0, fb: 0, scripts: [], analyzed: {}, history: [] }; }
}
function scSave(d) { localStorage.setItem(SC_KEY, JSON.stringify(d)); }
function scData() {
  const d = scLoad();
  if (d.date !== tdStr()) { d.date = tdStr(); d.gen = 0; d.fb = 0; }
  if (!d.analyzed) d.analyzed = {};
  if (!d.history) d.history = [];
  if (!d.scripts) d.scripts = [];
  return d;
}
function updateScCount() {
  const d = scData();
  const genEl = document.getElementById('sc-used');

  if (genEl) genEl.textContent = d.gen;
  if (fbEl) fbEl.textContent = d.fb;

  if (!btn) return;
  if (d.gen >= 5) { btn.disabled = true; btn.textContent = '오늘 생성 완료'; }
  else { btn.disabled = false; btn.textContent = '🎬 대본 생성'; }
}

function scLoadList() {

async function genScript() {
  const d = scData();
  if (d.gen >= 5) { alert('오늘 생성 횟수(5회)를 모두 사용했어요. 내일 다시 시도해보세요!'); return; }
  const btn = document.getElementById('sc-btn');
  const loading = document.getElementById('sc-loading');
  const empty = document.getElementById('sc-empty');
  btn.disabled = true;
  loading.classList.add('on');
  if (empty) empty.style.display = 'none';

  // 이미 쓴 장르+상황 조합 수집
  const usedCombos = (d.scripts || []).map(s => (s.genre||'') + '|' + (s.situation||''));
  const usedGenres = (d.scripts || []).map(s => s.genre || '');
  const usedSituations = (d.scripts || []).map(s => s.situation || '');

  // 안 쓴 장르 우선, 없으면 전체
  const unusedGenres = GENRES.filter(g => !usedGenres.includes(g));
  const genrePool = unusedGenres.length ? unusedGenres : GENRES;
  const genre = genrePool[Math.floor(Math.random() * genrePool.length)];

  // 안 쓴 상황 우선, 없으면 전체
  const unusedSituations = SITUATIONS.filter(s => !usedSituations.includes(s));
  const sitPool = unusedSituations.length ? unusedSituations : SITUATIONS;
  const situation = sitPool[Math.floor(Math.random() * sitPool.length)];

  const randQ = RAND_QS[Math.floor(Math.random() * RAND_QS.length)];

  // AI에게 이전 생성 목록 전달
  const usedScripts = (d.scripts || []).map(s => `장르:${s.genre} / 상황:${s.situation}`);

  // 약점 요약 추출 — 평균 가장 낮은 항목 (토큰 30개 이내)
  const weaknessTip = (() => {
    const hist = (d.scoreHistory || []).slice(-10);
    if (!hist.length) return '';
    const keys = ['intro','conflict','dialogue','direction'];
    const labels = {intro:'씬소개',conflict:'갈등구조',dialogue:'핵심대사',direction:'연출제안'};
    const avgs = keys.map(k => ({
      k, avg: hist.reduce((s,h) => s + (h.scores?.[k] || 3), 0) / hist.length
    })).sort((a,b) => a.avg - b.avg);
    const weak = avgs[0];
    if (weak.avg >= 4) return ''; // 전반적으로 잘하면 전달 안 함
    return `학생 약점: ${labels[weak.k]}(평균${weak.avg.toFixed(1)}점) — 이 부분이 드러나는 씬으로 출제하세요.`;
  })();

  try {
    const r = await fetch('/api/summarize', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode: 'script', genre, situation, usedScripts, weaknessTip })
    });
    const res = await r.json();
    if (!r.ok) throw new Error(res.error || '생성 실패');
    const sc = { ...res.script, genre, situation, randQ, id: Date.now(), savedDate: tdStr() };
    d.gen++; d.date = tdStr();
    d.scripts = d.scripts || [];
    d.scripts.unshift(sc);
    // 7일치 유지
    const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 7);
    d.scripts = d.scripts.filter(s => !s.savedDate || new Date(s.savedDate) >= cutoff);
    // 히스토리 기록
    d.history = d.history || [];
    d.history.unshift({ date: tdStr(), genre, situation, id: sc.id });
    if (d.history.length > 50) d.history = d.history.slice(0, 50);
    scSave(d);
    scList = d.scripts;
    updateScCount();
    renderScripts();
  } catch (e) {
    alert('생성 실패: ' + e.message);
  } finally {
    loading.classList.remove('on');
  }
}

/* ── 대본 형식 파싱 ── */
function formatScript(raw) {
  if (!raw) return '';
  return raw.split('\n').map(line => {
    const t = line.trim();
    if (!t) return '<br>';
    if (/^S#\d+|^씬\s*\d+/i.test(t))
      return '<span class="sc-dir" style="color:#888;font-weight:700;">' + t + '</span>';
    if ((t.startsWith('(') && t.includes(')')) || t.startsWith('['))
      return '<span class="sc-dir">' + t + '</span>';
    const m = t.match(/^([가-힣A-Za-z\s]{1,8})(\s*\([^)]*\))?\s*:\s*(.*)/);
    if (m) return '<span class="sc-char">' + m[1].trim() + (m[2] ? '<span class="sc-dir">' + m[2] + '</span>' : '') + '</span><span class="sc-line">: ' + m[3] + '</span>';
    return '<span class="sc-dir">' + t + '</span>';
  }).join('\n');
}

/* ── 모범 분석 (대본 당 1회, 잠금 저장) ── */
async function toggleModel(id) {
  const box = document.getElementById('scm' + id);
  if (!box) return;
  if (box.classList.contains('on')) { box.classList.remove('on'); return; }
  const d = scData();
  // 이미 분석 완료된 경우 저장된 것 표시
  if (d.analyzed && d.analyzed[id]) {
    const sc = scList.find(s => s.id === id);
    const content = document.getElementById('scmc' + id);
    if (content && sc && sc._analysis) content.innerHTML = renderAnalysis(sc._analysis);
    box.classList.add('on');
    return;
  }
  box.classList.add('on');
  const loadingEl = document.getElementById('scml' + id);
  loadingEl.style.display = 'block';
  const sc = scList.find(s => s.id === id);
  if (!sc) { loadingEl.style.display = 'none'; return; }
  try {
    const r = await fetch('/api/summarize', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode: 'scriptAnalysis', script: sc.script, genre: sc.genre, situation: sc.situation })
    });
    const res = await r.json();
    if (!r.ok) throw new Error(res.error || '분석 실패');
    const a = res.analysis;
    const contentEl = document.getElementById('scmc' + id);
    contentEl.innerHTML = renderAnalysis(a);
    // 잠금 저장 — 새로고침해도 유지
    d.analyzed[id] = true;
    const scIdx = d.scripts.findIndex(s => s.id === id);
    if (scIdx >= 0) d.scripts[scIdx]._analysis = a;
    scSave(d);
    // 버튼 비활성
    const mbtn = document.getElementById('scmbtn' + id);
    if (mbtn) { mbtn.textContent = '📋 분석 완료'; mbtn.disabled = true; mbtn.style.opacity = '.5'; }
  } catch (e) {
    const contentEl = document.getElementById('scmc' + id);
    contentEl.innerHTML = '<div style="color:var(--muted);font-size:.75rem;">분석 실패: ' + e.message + '</div>';
  } finally { loadingEl.style.display = 'none'; }
}

/* ── AI 첨삭 (항목별 점수형, 하루 10회 제한) ── */
async function submitAnalysis(id) {
  const d = scData();
  if (d.fb >= 10) { alert('오늘 첨삭 횟수(10회)를 모두 사용했어요!'); return; }
  const a = (document.getElementById('sct_a' + id) || {}).value || '';
  const b = (document.getElementById('sct_b' + id) || {}).value || '';
  const c = (document.getElementById('sct_c' + id) || {}).value || '';
  const dv = (document.getElementById('sct_d' + id) || {}).value || '';
  if (!a && !b && !c && !dv) { alert('분석 내용을 먼저 작성해주세요!'); return; }
  const userText = `① 씬 소개: ${a}\n② 갈등 구조: ${b}\n③ 핵심 대사: ${c}\n④ 연출 제안: ${dv}`;
  const sc = scList.find(s => s.id === id);
  if (!sc) return;
  const feedback = document.getElementById('scf' + id);
  const fbContent = document.getElementById('scfc' + id);
  feedback.classList.add('on');
  fbContent.innerHTML = '<span style="color:var(--muted);font-size:.75rem;">✦ 첨삭 중...</span>';
  try {
    const r = await fetch('/api/summarize', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode: 'scriptFeedback', script: sc.script, genre: sc.genre, userAnalysis: userText })
    });
    const res = await r.json();
    if (!r.ok) throw new Error(res.error || '첨삭 실패');
    d.fb++; d.date = tdStr();

    // ── 약점 학습: 점수 누적 저장 ──
    if (res.scores) {
      if (!d.scoreHistory) d.scoreHistory = [];
      d.scoreHistory.push({
        date: tdStr(),
        genre: sc.genre || '',
        scores: res.scores
      });
      if (d.scoreHistory.length > 30) d.scoreHistory = d.scoreHistory.slice(-30);
      // 대본에도 피드백 저장 (약점 요약용)
      const scIdx = d.scripts.findIndex(s => s.id === id);
      if (scIdx >= 0) d.scripts[scIdx]._feedbackScores = res.scores;
    }
    scSave(d);
    updateScCount();
    const fbEl2 = document.getElementById('sc-fb-used2');
    if (fbEl2) fbEl2.textContent = d.fb;
    // 점수형 렌더링
    if (res.scores) {
      fbContent.innerHTML = renderFeedback(res.scores, res.feedback);
      // 약점 차트 업데이트
      renderWeaknessChart();
    } else {
      fbContent.innerHTML = res.feedback.replace(/\n/g, '<br>');
    }
  } catch (e) {
    fbContent.innerHTML = '<span style="color:var(--muted);">첨삭 실패: ' + e.message + '</span>';
  }
}

function renderFeedback(scores, comment) {
  const items = [
    { key: 'intro', label: '씬 소개', color: '#c084fc' },
    { key: 'conflict', label: '갈등 구조', color: var_blue },

    { key: 'direction', label: '연출 제안', color: var_green }
  ];
  const bars = items.map(it => {
    const score = scores[it.key] || 0;
    const pct = (score / 5) * 100;
    return `<div style="margin-bottom:.5rem;">
      <div style="display:flex;justify-content:space-between;font-size:.7rem;margin-bottom:.2rem;">
        <span style="color:${it.color};">${it.label}</span>
        <span style="color:#fff;font-weight:700;">${score}<span style="color:var(--muted);font-weight:400;">/5</span></span>
      </div>
      <div style="background:#1a1a1a;border-radius:4px;height:5px;">
        <div style="background:${it.color};width:${pct}%;height:5px;border-radius:4px;transition:width .5s;"></div>
      </div>
    </div>`;
  }).join('');
  return `<div style="margin-bottom:.8rem;">${bars}</div>
    <div style="font-size:.78rem;line-height:1.8;color:#ccc;">${(comment || '').replace(/\n/g, '<br>')}</div>`;
}

let wfEssayText = '';

async function wfHandleFile(input) {
  const file = input.files[0];
  if (!file) return;
  document.getElementById('wf-filename').textContent = file.name;
  document.getElementById('wf-btn').disabled = true;
  wfEssayText = '';

  try {
    if (file.name.endsWith('.txt')) {
      wfEssayText = await file.text();
    } else {
      // docx → mammoth
      const buf = await file.arrayBuffer();
      const result = await mammoth.extractRawText({ arrayBuffer: buf });
      wfEssayText = result.value.trim();
    }
    if (wfEssayText.length < 30) {
      alert('파일 내용이 너무 짧아요. 작문 내용을 확인해주세요.');
      return;
    }
    document.getElementById('wf-btn').disabled = false;
  } catch(e) {
    alert('파일 읽기 실패: ' + e.message);
  }
}

async function wfGenFeedback() {
  if (!wfEssayText) return;
  const btn = document.getElementById('wf-btn');
  const loading = document.getElementById('wf-loading');
  const resultEl = document.getElementById('wf-result');

  btn.disabled = true;
  loading.style.display = 'block';
  resultEl.innerHTML = '';

  try {
    const r = await fetch('/api/summarize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mode: 'writingFeedback', essay: wfEssayText })
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || '실패');

    resultEl.innerHTML = wfRender(data, wfEssayText);
  } catch(e) {
    resultEl.innerHTML = '<div style="color:#ef4444;font-size:.78rem;padding:.5rem">피드백 생성 실패: ' + e.message + '</div>';
  } finally {
    loading.style.display = 'none';
    btn.disabled = false;
  }
}

function wfRender(d, originalText) {
  const score = d.score || 0;
  const scoreColor = score >= 80 ? '#22c55e' : score >= 60 ? '#f97316' : '#ef4444';

  const errHtml = (d.errors||[]).map(e =>
    `<div class="wf-item wf-error">
      <div class="wf-item-orig">"${e.original||''}"</div>
      <div class="wf-item-detail">🔴 ${e.issue||''}<br><span style="color:#86efac">→ ${e.fix||''}</span></div>
    </div>`).join('');

  const factHtml = (d.facts||[]).map(f =>
    `<div class="wf-item wf-fact">
      <div class="wf-item-orig">"${f.original||''}"</div>
      <div class="wf-item-detail">🟡 ${f.issue||''}</div>
    </div>`).join('');

  const strHtml = (d.strengths||[]).map(s =>
    `<div class="wf-item wf-strength">
      <div class="wf-item-orig">"${s.original||''}"</div>
      <div class="wf-item-detail">🟢 ${s.comment||''}</div>
    </div>`).join('');

  const sugHtml = (d.suggestions||[]).map(s =>
    `<div class="wf-suggestion">${s}</div>`).join('');

  return `<div class="wf-result-box">
    <div style="display:flex;align-items:baseline;gap:.5rem;margin-bottom:.5rem">
      <div class="wf-score" style="color:${scoreColor}">${score}</div>
      <div class="wf-score-label">/ 100점</div>
    </div>
    <div class="wf-summary">${d.summary||''}</div>
    ${errHtml ? `<div class="wf-section-title" style="color:#ef4444">🔴 비문 / 어색한 표현</div>${errHtml}` : ''}
    ${factHtml ? `<div class="wf-section-title" style="color:#fbbf24">🟡 사실 오류 / 불명확한 정보</div>${factHtml}` : ''}
    ${strHtml ? `<div class="wf-section-title" style="color:#22c55e">🟢 잘 쓴 표현</div>${strHtml}` : ''}
    ${sugHtml ? `<div class="wf-section-title" style="color:var(--muted)">💡 개선 제안</div><div class="wf-suggestions">${sugHtml}</div>` : ''}
    ${(d.visualLanguage||[]).length ? `<div class="wf-section-title" style="color:#c084fc">🎥 영상 언어 제안</div>
      <div class="wf-vl-grid">${(d.visualLanguage||[]).map(v =>
        `<div class="wf-vl-item"><div class="wf-vl-term">${v.term||''}</div><div class="wf-vl-apply">${v.application||''}</div></div>`
      ).join('')}</div>` : ''}
    <div class="wf-export-wrap">
      <button class="wr-export-btn" onclick="wfExportDocx(${JSON.stringify(d).replace(/'/g,"&#39;")}, ${JSON.stringify(originalText).replace(/'/g,"&#39;")})">📄 피드백 워드 내보내기</button>
    </div>
  </div>`;
}

function renderWeaknessChart() {
  const d = scData();
  const hist = (d.scoreHistory || []).slice(-20);
  const wrap = document.getElementById('sc-weakness-wrap');
  const el = document.getElementById('sc-weakness-chart');
  if (!el) return;
  if (!hist.length) { if(wrap) wrap.style.display='none'; return; }
  if(wrap) wrap.style.display='block';

  const keys = ['intro','conflict','dialogue','direction'];
  const labels = { intro:'씬 소개', conflict:'갈등 구조', dialogue:'핵심 대사', direction:'연출 제안' };
  const colors = { intro:'#c084fc', conflict:'var(--blue)', dialogue:'#fbbf24', direction:'var(--green)' };

  // 항목별 평균
  const avgs = {};
  keys.forEach(k => {
    avgs[k] = hist.reduce((s,h) => s + (h.scores?.[k] || 0), 0) / hist.length;
  });

  // 최근 추이 (5회)
  const recent = hist.slice(-5);
  const recentAvgs = {};
  keys.forEach(k => {
    recentAvgs[k] = recent.length
      ? recent.reduce((s,h) => s + (h.scores?.[k] || 0), 0) / recent.length
      : avgs[k];
  });

  const sorted = keys.slice().sort((a,b) => avgs[a] - avgs[b]);
  const weakest = sorted[0];

  const bars = keys.map(k => {
    const pct = (avgs[k] / 5) * 100;
    const rPct = (recentAvgs[k] / 5) * 100;
    const trend = recentAvgs[k] - avgs[k];
    const trendIcon = trend > 0.2 ? '↑' : trend < -0.2 ? '↓' : '→';
    const trendColor = trend > 0.2 ? 'var(--green)' : trend < -0.2 ? '#f87171' : 'var(--muted)';
    const isWeak = k === weakest;
    return `<div style="margin-bottom:.55rem;">
      <div style="display:flex;justify-content:space-between;align-items:center;font-size:.7rem;margin-bottom:.25rem;">
        <span style="color:${colors[k]};font-weight:${isWeak?'800':'600'};">${labels[k]}${isWeak?' ⚠️':''}</span>
        <span style="display:flex;gap:.4rem;align-items:center;">
          <span style="color:${trendColor};font-size:.65rem;">${trendIcon} 최근</span>
          <span style="color:#fff;font-weight:700;">${avgs[k].toFixed(1)}<span style="color:var(--muted);font-weight:400;">/5</span></span>
        </span>
      </div>
      <div style="background:#1a1a1a;border-radius:4px;height:6px;position:relative;">
        <div style="background:${colors[k]};opacity:.3;width:${pct}%;height:6px;border-radius:4px;position:absolute;"></div>
        <div style="background:${colors[k]};width:${rPct}%;height:6px;border-radius:4px;position:absolute;transition:width .6s;"></div>
      </div>
    </div>`;
  }).join('');

  // 장르별 약점
  const genreMap = {};
  hist.forEach(h => {
    if (!h.genre) return;
    if (!genreMap[h.genre]) genreMap[h.genre] = { total: 0, count: 0 };
    const avg = keys.reduce((s,k) => s + (h.scores?.[k]||0), 0) / keys.length;
    genreMap[h.genre].total += avg;
    genreMap[h.genre].count++;
  });
  const genreStats = Object.entries(genreMap)
    .map(([g,v]) => ({ g, avg: v.total/v.count }))
    .sort((a,b) => a.avg - b.avg);
  const weakGenre = genreStats[0];

  const genreHtml = genreStats.length > 1
    ? `<div style="margin-top:.7rem;font-size:.7rem;color:var(--muted);">
        장르별: ${genreStats.map(({g,avg}) =>
          `<span style="margin-right:.4rem;color:${avg<3?'#f87171':avg<4?'#fbbf24':'var(--green)'};">${g} ${avg.toFixed(1)}점</span>`
        ).join('')}
      </div>` : '';

  const tipHtml = `<div style="margin-top:.6rem;padding:.5rem .7rem;background:rgba(251,191,36,.06);border:1px solid rgba(251,191,36,.2);border-radius:6px;font-size:.72rem;color:#f0d060;">
    💡 ${avgs[weakest] >= 4
      ? '전반적으로 잘하고 있어요! 고르게 유지하세요.'
      : `<b>${labels[weakest]}</b>이 가장 약해요 (평균 ${avgs[weakest].toFixed(1)}점). 다음 대본 생성 시 이 부분을 집중 연습하도록 씬이 설계됩니다.`}
  </div>`;

  el.innerHTML = bars + genreHtml + tipHtml;
}
