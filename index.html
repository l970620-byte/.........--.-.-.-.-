<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>온에어 브리핑 — 서울예대 방송영상 입시</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg: #0a0a0a;
  --red: #ff2d2d;
  --yellow: #ffe033;
  --white: #f5f3ee;
  --gray: #1c1c1c;
  --muted: #555;
  --border: #222;
  --card: #141414;
}

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 300;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── HEADER ─── */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 0 1.2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 56px;
}

.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.5rem;
  letter-spacing: 0.08em;
  color: var(--white);
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.logo .on-air {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  background: var(--red);
  color: white;
  font-size: 0.6rem;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 700;
  padding: 0.15rem 0.4rem;
  border-radius: 2px;
  letter-spacing: 0.1em;
}

.on-air-dot {
  width: 5px; height: 5px;
  background: white;
  border-radius: 50%;
  animation: blink 1.2s infinite;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

#clock {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.3rem;
  letter-spacing: 0.1em;
  color: var(--yellow);
}

/* ─── BRIEFING TIMES ─── */
.brief-strip {
  background: var(--gray);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  overflow-x: auto;
  scrollbar-width: none;
  padding: 0 1.2rem;
  height: 36px;
  gap: 0;
}
.brief-strip::-webkit-scrollbar { display:none; }

.brief-label {
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  color: var(--muted);
  text-transform: uppercase;
  white-space: nowrap;
  margin-right: 0.8rem;
}

.bt {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.85rem;
  padding: 0 0.7rem;
  height: 22px;
  display: inline-flex;
  align-items: center;
  letter-spacing: 0.08em;
  border: 1px solid var(--border);
  border-radius: 2px;
  color: var(--muted);
  margin-right: 0.4rem;
  white-space: nowrap;
  transition: all 0.2s;
}
.bt.done { border-color: #333; color: #444; text-decoration: line-through; }
.bt.next { border-color: var(--red); color: var(--red); animation: blink 1.2s infinite; }
.bt.upcoming { border-color: var(--muted); color: var(--muted); }

.next-label {
  font-size: 0.6rem;
  color: var(--muted);
  white-space: nowrap;
  margin-left: auto;
  padding-left: 0.8rem;
}
.next-label span { color: var(--yellow); }

/* ─── KEYWORD SECTION ─── */
.section {
  padding: 1rem 1.2rem 0.6rem;
  border-bottom: 1px solid var(--border);
}

.section-title {
  font-size: 0.6rem;
  letter-spacing: 0.25em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 0.7rem;
}

.keyword-list {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  margin-bottom: 0.7rem;
}

.kw-chip {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  font-size: 0.78rem;
  font-weight: 500;
  padding: 0.3rem 0.7rem;
  border: 1px solid var(--border);
  border-radius: 100px;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.kw-chip:hover { border-color: #555; color: var(--white); }
.kw-chip.active { border-color: var(--yellow); color: var(--yellow); background: rgba(255,224,51,0.07); }

.kw-chip .del-btn {
  display: none;
  font-size: 0.7rem;
  color: var(--red);
  line-height: 1;
}
.kw-chip:hover .del-btn { display: inline; }

.kw-add-row {
  display: flex;
  gap: 0.5rem;
  align-items: center;
}

.kw-input {
  flex: 1;
  max-width: 200px;
  background: var(--gray);
  border: 1px solid var(--border);
  color: var(--white);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 0.8rem;
  padding: 0.35rem 0.7rem;
  border-radius: 100px;
  outline: none;
  transition: border-color 0.15s;
}
.kw-input::placeholder { color: var(--muted); }
.kw-input:focus { border-color: var(--yellow); }

.kw-add-btn {
  font-size: 0.75rem;
  font-weight: 700;
  padding: 0.35rem 0.9rem;
  background: var(--yellow);
  color: var(--bg);
  border: none;
  border-radius: 100px;
  cursor: pointer;
  transition: opacity 0.15s;
  white-space: nowrap;
}
.kw-add-btn:hover { opacity: 0.85; }

/* ─── DATE FILTER ─── */
.date-bar {
  padding: 0.6rem 1.2rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex-wrap: wrap;
}

.date-label {
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  color: var(--muted);
  text-transform: uppercase;
  white-space: nowrap;
}

.date-chip {
  font-size: 0.75rem;
  font-weight: 500;
  padding: 0.25rem 0.75rem;
  border: 1px solid var(--border);
  border-radius: 100px;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.date-chip:hover { border-color: #555; color: var(--white); }
.date-chip.active { border-color: var(--yellow); color: var(--yellow); background: rgba(255,224,51,0.07); }

.date-custom {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  margin-left: auto;
}

.date-input {
  background: var(--gray);
  border: 1px solid var(--border);
  color: var(--white);
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 0.75rem;
  padding: 0.25rem 0.6rem;
  border-radius: 6px;
  outline: none;
  transition: border-color 0.15s;
  color-scheme: dark;
}
.date-input:focus { border-color: var(--yellow); }

/* ─── FETCH BUTTON ─── */
.fetch-bar {
  padding: 0.8rem 1.2rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 0.8rem;
  flex-wrap: wrap;
}

.fetch-btn {
  flex: 1;
  min-width: 140px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
  letter-spacing: 0.12em;
  padding: 0.6rem 1.5rem;
  background: var(--red);
  color: white;
  border: none;
  border-radius: 4px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  transition: opacity 0.2s;
}
.fetch-btn:hover { opacity: 0.85; }
.fetch-btn:disabled { opacity: 0.35; cursor: not-allowed; }

#status-text { font-size: 0.72rem; color: var(--muted); flex: 2; }
#status-text.live { color: var(--yellow); }

/* ─── NEWS GRID ─── */
main { padding: 1rem 1.2rem 4rem; }

.news-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
}
@media (min-width: 640px) {
  .news-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (min-width: 1024px) {
  .news-grid { grid-template-columns: repeat(3, 1fr); }
  .news-card:first-child { grid-column: span 2; }
}

.news-card {
  background: var(--card);
  padding: 1.4rem;
  display: flex;
  flex-direction: column;
  gap: 0.9rem;
  animation: fadeUp 0.35s ease both;
  transition: background 0.15s;
}
.news-card:hover { background: #1a1a1a; }

@keyframes fadeUp {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}

.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 0.5rem;
}

.card-idx {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem;
  line-height: 1;
  color: var(--border);
}
.news-card:first-child .card-idx { color: var(--red); }

.card-source {
  font-size: 0.62rem;
  letter-spacing: 0.1em;
  color: var(--muted);
  text-transform: uppercase;
  text-align: right;
  line-height: 1.4;
}

.card-title {
  font-size: 0.95rem;
  font-weight: 500;
  line-height: 1.55;
}
.news-card:first-child .card-title { font-size: 1.1rem; }
.card-title a {
  color: var(--white);
  text-decoration: none;
}
.card-title a:hover { color: var(--yellow); }

.card-date {
  font-size: 0.68rem;
  color: var(--muted);
}

/* ─── SKELETON ─── */
.skeleton-card {
  background: var(--card);
  padding: 1.4rem;
  display: flex;
  flex-direction: column;
  gap: 0.7rem;
}
.skel {
  background: linear-gradient(90deg, var(--border) 25%, #2a2a2a 50%, var(--border) 75%);
  background-size: 300% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 3px;
  height: 12px;
}
.skel.lg { height: 18px; width: 80%; }
.skel.sm { width: 50%; }
@keyframes shimmer {
  0%   { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ─── EMPTY / ERROR ─── */
.empty {
  grid-column: 1/-1;
  padding: 4rem 1rem;
  text-align: center;
}
.empty-icon { font-size: 2.5rem; opacity: 0.2; margin-bottom: 1rem; }
.empty p { font-size: 0.85rem; color: var(--muted); line-height: 1.8; }
.empty strong { display: block; color: #666; font-size: 0.95rem; margin-bottom: 0.3rem; font-weight: 500; }

.error-bar {
  display: none;
  margin-bottom: 0.8rem;
  padding: 0.6rem 0.9rem;
  background: rgba(255,45,45,0.08);
  border: 1px solid var(--red);
  border-radius: 4px;
  font-size: 0.75rem;
  color: #ff7777;
}

/* ─── FOOTER ─── */
footer {
  padding: 1.2rem;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 0.5rem;
}
footer p { font-size: 0.62rem; color: #444; line-height: 1.6; }

.free-badge {
  display: inline-block;
  font-size: 0.55rem;
  font-weight: 700;
  background: rgba(80,200,80,0.15);
  color: #5c5;
  border: 1px solid #3a3;
  border-radius: 3px;
  padding: 1px 5px;
  letter-spacing: 0.1em;
  margin-left: 0.4rem;
  vertical-align: middle;
}

/* ─── SUMMARY BOX ─── */
.summary-wrap {
  margin: 1rem 1.2rem 0;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  display: none;
}
.summary-wrap.visible { display: block; }

.summary-header {
  background: rgba(255,224,51,0.08);
  border-bottom: 1px solid var(--border);
  padding: 0.5rem 1rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.5rem;
}
.summary-title {
  font-size: 0.65rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  color: var(--yellow);
  text-transform: uppercase;
}
.summary-close {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 0.9rem;
  line-height: 1;
  padding: 0;
}
.summary-body {
  padding: 1rem;
  font-size: 0.82rem;
  line-height: 1.7;
  color: #ccc;
  white-space: pre-wrap;
  min-height: 60px;
}
.summary-body .loading-dots::after {
  content: '...';
  animation: dots 1s steps(3, end) infinite;
}
@keyframes dots {
  0%   { content: '.'; }
  33%  { content: '..'; }
  66%  { content: '...'; }
}
.sum-btn {
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  padding: 0.28rem 0.8rem;
  border: 1px solid var(--yellow);
  border-radius: 4px;
  background: rgba(255,224,51,0.08);
  color: var(--yellow);
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.sum-btn:hover { background: rgba(255,224,51,0.18); }
.sum-btn:disabled { opacity: 0.35; cursor: not-allowed; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="on-air"><span class="on-air-dot"></span>ON AIR</span>
    브리핑
    <span class="free-badge">FREE</span>
  </div>
  <div id="clock">--:--:--</div>
</header>

<div class="brief-strip">
  <span class="brief-label">BRIEFING</span>
  <span class="bt" id="bt-8">오전 8:00</span>
  <span class="bt" id="bt-12">오후 12:00</span>
  <span class="bt" id="bt-18">오후 6:00</span>
  <span class="next-label">다음: <span id="next-brief">--:--</span></span>
</div>

<div class="section">
  <div class="section-title">키워드 관리 — 클릭해서 선택 · ✕로 삭제 · 직접 추가 가능</div>
  <div class="keyword-list" id="kw-list"></div>
  <div class="kw-add-row">
    <input class="kw-input" id="kw-input" placeholder="키워드 추가..." maxlength="20">
    <button class="kw-add-btn" onclick="addKeyword()">+ 추가</button>
  </div>
</div>

<div class="date-bar">
  <span class="date-label">기간</span>
  <button class="date-chip active" data-range="1" onclick="setRange(this)">오늘</button>
  <button class="date-chip" data-range="3" onclick="setRange(this)">3일</button>
  <button class="date-chip" data-range="7" onclick="setRange(this)">1주일</button>
  <button class="date-chip" data-range="30" onclick="setRange(this)">1개월</button>
  <button class="date-chip" data-range="0" onclick="setRange(this)">직접 선택</button>
  <div class="date-custom" id="date-custom" style="display:none;">
    <input type="date" class="date-input" id="date-from">
    <span style="color:var(--muted);font-size:0.7rem;">~</span>
    <input type="date" class="date-input" id="date-to">
  </div>
</div>

<div class="fetch-bar">
  <button class="fetch-btn" id="fetch-btn" onclick="fetchNews()">
    ▶ 뉴스 불러오기
  </button>
  <button class="sum-btn" id="sum-btn" onclick="summarizeNews()" disabled>✦ AI 요약</button>
  <span id="status-text">키워드를 선택하고 불러오세요</span>
</div>

<div class="summary-wrap" id="summary-wrap">
  <div class="summary-header">
    <span class="summary-title">✦ AI 3줄 브리핑 — <span id="sum-keyword"></span></span>
    <button class="summary-close" onclick="closeSummary()">✕</button>
  </div>
  <div class="summary-body" id="summary-body"></div>
</div>

<main>
  <div class="error-bar" id="error-bar"></div>
  <div class="news-grid" id="news-grid">
    <div class="empty">
      <div class="empty-icon">📡</div>
      <p><strong>브리핑 대기 중</strong>키워드를 선택하고<br>「뉴스 불러오기」를 눌러보세요</p>
    </div>
  </div>
</main>

<footer>
  <p>서울예술대학교 방송영상전공 입시 대비<br>Google News RSS 기반 · 완전 무료</p>
  <p>매일 오전 8시 · 낮 12시 · 오후 6시 자동 브리핑<br>또는 언제든 수동 실행 가능</p>
</footer>

<script>
const DEFAULT_KEYWORDS = [
  "OTT 플랫폼", "공영방송 수신료", "방송 보편적 접근성", "토종 OTT",
  "숏폼 콘텐츠", "웹툰 드라마화", "유튜브 TV화", "다큐멘터리",
  "AI 저작권", "버추얼 휴먼", "예술인 도덕성",
  "K콘텐츠 글로벌화", "방송 광고 시장", "1인 미디어 규제",
  "AI 방송 제작", "크리에이터 경제", "미디어 리터러시",
  "MZ 미디어", "방송 콘텐츠 다양성", "라이브 스트리밍"
];

const KICHUL_SET = new Set([
  "OTT 플랫폼","공영방송 수신료","방송 보편적 접근성","토종 OTT",
  "숏폼 콘텐츠","웹툰 드라마화","유튜브 TV화","다큐멘터리",
  "AI 저작권","버추얼 휴먼","예술인 도덕성"
]);

const STORAGE_KEY = 'news_keywords_v3';
const BRIEFING_HOURS = [8, 12, 18];
const RSS_PROXY = 'https://api.rss2json.com/v1/api.json?rss_url=';

let keywords = [];
let activeKeyword = '';
let activeRange = 1;

// ── 날짜 필터 ──────────────────────────────────────
function setRange(btn) {
  document.querySelectorAll('.date-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  activeRange = parseInt(btn.dataset.range);
  document.getElementById('date-custom').style.display = activeRange === 0 ? 'flex' : 'none';
}

function getDateFilter() {
  if (activeRange === 0) {
    const from = document.getElementById('date-from').value;
    const to   = document.getElementById('date-to').value;
    if (!from && !to) return '';
    const f = from ? `after:${from}` : '';
    const t = to   ? `before:${to}`  : '';
    return [f, t].filter(Boolean).join('+');
  }
  if (activeRange === 1) return 'when:1d';
  const to = new Date();
  const from = new Date();
  from.setDate(from.getDate() - activeRange);
  const fmt = d => d.toISOString().slice(0,10);
  return `after:${fmt(from)}+before:${fmt(to)}`;
}

// ── 키워드 관리 ─────────────────────────────────────
function loadKeywords() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    keywords = saved ? JSON.parse(saved) : [...DEFAULT_KEYWORDS];
  } catch(e) { keywords = [...DEFAULT_KEYWORDS]; }
  if (!keywords.length) keywords = [...DEFAULT_KEYWORDS];
  activeKeyword = keywords[0];
  renderKeywords();
}

function saveKeywords() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(keywords)); } catch(e) {}
}

function renderKeywords() {
  const list = document.getElementById('kw-list');
  list.innerHTML = keywords.map(kw => {
    const badge = KICHUL_SET.has(kw)
      ? `<span style="font-size:0.58rem;background:rgba(255,224,51,0.18);color:var(--yellow);border-radius:3px;padding:0 4px;font-weight:700;margin-left:2px;">기출</span>`
      : '';
    return `<button class="kw-chip ${kw===activeKeyword?'active':''}" onclick="selectKw('${kw.replace(/'/g,"\\'")}')">
      ${kw}${badge}
      <span class="del-btn" onclick="delKw(event,'${kw.replace(/'/g,"\\'")}')">✕</span>
    </button>`;
  }).join('');
}

function selectKw(kw) { activeKeyword = kw; renderKeywords(); }

function delKw(e, kw) {
  e.stopPropagation();
  keywords = keywords.filter(k => k !== kw);
  if (activeKeyword === kw) activeKeyword = keywords[0] || '';
  saveKeywords(); renderKeywords();
}

function addKeyword() {
  const input = document.getElementById('kw-input');
  const val = input.value.trim();
  if (!val || keywords.includes(val)) { input.value = ''; return; }
  keywords.push(val);
  activeKeyword = val;
  saveKeywords(); renderKeywords();
  input.value = '';
}

document.getElementById('kw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') addKeyword();
});

// ── 시계 & 브리핑 타임 ──────────────────────────────
function tick() {
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  document.getElementById('clock').textContent =
    `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;

  const h = now.getHours();
  const ids = {8:'bt-8', 12:'bt-12', 18:'bt-18'};
  let nextStr = null;
  BRIEFING_HOURS.forEach(bh => {
    const el = document.getElementById(ids[bh]);
    if (h > bh)        el.className = 'bt done';
    else if (h === bh) el.className = 'bt next';
    else { el.className = 'bt upcoming'; if (!nextStr) nextStr = `${pad(bh)}:00`; }
  });
  document.getElementById('next-brief').textContent = nextStr || '내일 08:00';
  if (now.getMinutes()===0 && now.getSeconds()===0 && BRIEFING_HOURS.includes(h)) fetchNews();
}
setInterval(tick, 1000);
tick();

// ── 뉴스 불러오기 ────────────────────────────────────
async function fetchNews() {
  if (!activeKeyword) return;
  const btn = document.getElementById('fetch-btn');
  const grid = document.getElementById('news-grid');
  const statusEl = document.getElementById('status-text');
  const errorBar = document.getElementById('error-bar');

  btn.disabled = true;
  errorBar.style.display = 'none';
  statusEl.className = 'live';
  statusEl.textContent = `"${activeKeyword}" 검색 중...`;

  grid.innerHTML = Array(6).fill('').map(() => `
    <div class="skeleton-card">
      <div class="skel sm"></div><div class="skel lg"></div>
      <div class="skel"></div><div class="skel sm"></div>
    </div>`).join('');

  try {
    const dateFilter = getDateFilter();
    const fullQuery = dateFilter ? `${activeKeyword} ${dateFilter}` : activeKeyword;
    const query = encodeURIComponent(fullQuery);
    const rssUrl = `https://news.google.com/rss/search?q=${query}&hl=ko&gl=KR&ceid=KR:ko`;
    const apiUrl = `${RSS_PROXY}${encodeURIComponent(rssUrl)}&count=10`;

    const res = await fetch(apiUrl);
    if (!res.ok) throw new Error(`네트워크 오류 (${res.status})`);
    const data = await res.json();

    if (data.status !== 'ok' || !data.items?.length) {
      throw new Error('검색 결과가 없습니다. 다른 키워드를 시도해보세요.');
    }

    const articles = data.items.slice(0, 9).map(item => ({
      title: stripHtml(item.title),
      url: item.link,
      source: item.author || extractSource(item.title),
      date: formatDate(item.pubDate)
    }));

    renderCards(articles);
    statusEl.className = 'live';
    const rangeLabel = activeRange === 0 ? '직접 선택' : activeRange === 1 ? '오늘' : `최근 ${activeRange}일`;
    statusEl.textContent = `${articles.length}건 · ${rangeLabel} · ${new Date().toLocaleTimeString('ko-KR')}`;
    document.getElementById('sum-btn').disabled = false;
    window._lastHeadlines = articles.map(a => a.title);
    closeSummary();

  } catch(err) {
    grid.innerHTML = `<div class="empty">
      <div class="empty-icon">⚠️</div>
      <p><strong>불러오기 실패</strong>${err.message}</p>
    </div>`;
    errorBar.textContent = '오류: ' + err.message;
    errorBar.style.display = 'block';
    statusEl.className = '';
    statusEl.textContent = '다시 시도해 주세요';
  }
  btn.disabled = false;
}

function renderCards(articles) {
  document.getElementById('news-grid').innerHTML = articles.map((a, i) => `
    <div class="news-card" style="animation-delay:${i*0.06}s">
      <div class="card-top">
        <span class="card-idx">${String(i+1).padStart(2,'0')}</span>
        <span class="card-source">${a.source}</span>
      </div>
      <div class="card-title">
        <a href="${a.url}" target="_blank" rel="noopener">${a.title}</a>
      </div>
      <div class="card-date">${a.date}</div>
    </div>`).join('');
}

// ── 유틸 ────────────────────────────────────────────
function stripHtml(str) {
  return str.replace(/<[^>]*>/g,'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"').trim();
}

function extractSource(title) {
  const m = title.match(/ - ([^-]+)$/);
  return m ? m[1].trim() : '뉴스';
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  const now = new Date();
  const diff = Math.floor((now - d) / 60000);
  if (diff < 60) return `${diff}분 전`;
  if (diff < 1440) return `${Math.floor(diff/60)}시간 전`;
  return `${d.getMonth()+1}/${d.getDate()}`;
}

// ── AI 요약 ─────────────────────────────────────────
async function summarizeNews() {
  const headlines = window._lastHeadlines;
  if (!headlines?.length) return;

  const btn = document.getElementById('sum-btn');
  const wrap = document.getElementById('summary-wrap');
  const body = document.getElementById('summary-body');
  const kwLabel = document.getElementById('sum-keyword');

  btn.disabled = true;
  kwLabel.textContent = activeKeyword;
  body.innerHTML = '<span class="loading-dots">AI가 분석 중</span>';
  wrap.classList.add('visible');
  wrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  try {
    const res = await fetch('/api/summarize', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ headlines, keyword: activeKeyword })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || '요약 실패');
    body.textContent = data.summary;
  } catch(e) {
    body.textContent = '⚠️ 요약 실패: ' + e.message;
  }
  btn.disabled = false;
}

function closeSummary() {
  document.getElementById('summary-wrap').classList.remove('visible');
  document.getElementById('summary-body').textContent = '';
}

// ── 초기화 ───────────────────────────────────────────
loadKeywords();
</script>
